        window.useReveal = function useReveal() {
            const ref = React.useRef(null);
            React.useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const io = new IntersectionObserver((entries) => {
                    entries.forEach(e => {
                        if (e.isIntersecting) {
                            e.target.classList.add('in');
                            io.unobserve(e.target);
                        }
                    });
                }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
                el.querySelectorAll('.reveal').forEach(n => io.observe(n));
                return () => io.disconnect();
            }, []);
            return ref;
        };

        window.smoothScrollTo = function smoothScrollTo(id) {
            const el = document.getElementById(id);
            if (!el) return;
            const y = el.getBoundingClientRect().top + window.scrollY - 24;
            window.scrollTo({ top: y, behavior: 'smooth' });
        };

        window.useScrollDirection = function useScrollDirection() {
            const [state, setState] = React.useState({ dir: 'up', atTop: true });
            React.useEffect(() => {
                let last = window.scrollY;
                let lastDir = 'up';
                let ticking = false;
                const THRESHOLD = 10;
                const TOP_ZONE = 80;
                const update = () => {
                    ticking = false;
                    const max = document.documentElement.scrollHeight - window.innerHeight;
                    const y = Math.max(0, Math.min(window.scrollY, max));
                    const atTop = y < TOP_ZONE;
                    let dir = lastDir;
                    if (atTop) {
                        dir = 'up';
                    } else if (y > last + THRESHOLD) {
                        dir = 'down';
                        last = y;
                    } else if (y < last - THRESHOLD) {
                        dir = 'up';
                        last = y;
                    }
                    setState((prev) =>
                        prev.dir === dir && prev.atTop === atTop ? prev : { dir, atTop }
                    );
                    lastDir = dir;
                };
                const onScroll = () => {
                    if (ticking) return;
                    ticking = true;
                    window.requestAnimationFrame(update);
                };
                window.addEventListener('scroll', onScroll, { passive: true });
                return () => window.removeEventListener('scroll', onScroll);
            }, []);
            return state;
        };

        window.useIsMobile = function useIsMobile(breakpoint = 768) {
            const [isMobile, setIsMobile] = React.useState(() => window.innerWidth <= breakpoint);
            React.useEffect(() => {
                const mq = window.matchMedia(`(max-width: ${breakpoint}px)`);
                setIsMobile(mq.matches);
                const handler = (e) => setIsMobile(e.matches);
                mq.addEventListener('change', handler);
                return () => mq.removeEventListener('change', handler);
            }, [breakpoint]);
            return isMobile;
        };

        window.useTheme = function useTheme() {

            React.useEffect(() => {

                });
                observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
                return () => observer.disconnect();
            }, []);
            return theme;
        };

        window.useTweaks = function useTweaks({ lang, setLang, theme, setTheme }) {
            const [visible, setVisible] = React.useState(false);

            React.useEffect(() => {
                const handler = (e) => {
                    const d = e.data || {};
                    if (d.type === '__activate_edit_mode') setVisible(true);
                    if (d.type === '__deactivate_edit_mode') setVisible(false);
                };
                window.addEventListener('message', handler);
                window.parent.postMessage({ type: '__edit_mode_available' }, '*');
                return () => window.removeEventListener('message', handler);
            }, []);

            if (!visible) return null;

            return (
                <div style={{
                    position: 'fixed', right: 24, bottom: 24, zIndex: 200,
                    background: 'var(--b-bg-elevated)', borderRadius: 24,
                    boxShadow: '0 12px 40px rgba(0,0,0,0.18), var(--emboss-soft)',
                    padding: 20, minWidth: 260,
                    border: '1px solid var(--b-border)',
                }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--b-text-3)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 14 }}>Tweaks</div>
                    <TweakRow label="Language">
                        {['en', 'es'].map(v => (
                            <button key={v} onClick={() => { setLang(v); tweakPersist({ lang: v }); }} style={tweakBtn(lang === v)}>{v.toUpperCase()}</button>
                        ))}
                    </TweakRow>
                    <TweakRow label="Appearance">
                        {[['auto', 'System'], ['light', 'Light'], ['dark', 'Dark']].map(([v, l]) => (
                            <button key={v} onClick={() => { setTheme(v); tweakPersist({ theme: v }); }} style={tweakBtn(theme === v)}>{l}</button>
                        ))}
                    </TweakRow>
                </div>
            );
        };

        function tweakPersist(edits) {
            window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
        }
        function TweakRow({ label, children }) {
            return (
                <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 11, color: 'var(--b-text-2)', marginBottom: 6 }}>{label}</div>
                    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>{children}</div>
                </div>
            );
        }
        function tweakBtn(active) {
            return {
                padding: '6px 12px', borderRadius: 100, border: 'none', cursor: 'pointer',
                fontSize: 12, fontWeight: 600, fontFamily: 'inherit',
                background: active ? 'var(--b-text)' : 'var(--b-bg)',

        }

                        <h2 style={{
                            fontSize: isMobile ? 36 : 52, fontWeight: 900, letterSpacing: '-0.03em',
                            lineHeight: 1.05, margin: '0 0 24px', color: 'var(--b-text)',
                        }}>{t.team.title}</h2>
                        <p style={{
                            fontSize: isMobile ? 17 : 18, lineHeight: 1.6, color: 'var(--b-text-2)',
                            margin: '0 auto 40px', maxWidth: 580,
                        }}>{t.team.body}</p>

                        <a href="index.html"
                            style={{
                                display: 'inline-flex', alignItems: 'center', gap: 10,
                                padding: isMobile ? '14px 28px' : '16px 32px',
                                background: 'var(--b-bg-elevated)',
                                color: 'var(--b-text)',
                                borderRadius: 100, fontSize: 15, fontWeight: 600,
                                boxShadow: 'var(--emboss-raised)',
                                transition: 'transform 0.3s ease, box-shadow 0.3s ease',
                                textDecoration: 'none', letterSpacing: '-0.01em',
                            }}
                            onMouseEnter={(e) => { e.currentTarget.style.transform = 'translateY(-3px)'; e.currentTarget.style.boxShadow = 'var(--emboss-raised-hover)'; }}
                            onMouseLeave={(e) => { e.currentTarget.style.transform = 'translateY(0)'; e.currentTarget.style.boxShadow = 'var(--emboss-raised)'; }}
                        >
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <path d="M13 8H3M6 5L3 8l3 3" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
                            </svg>
                            {t.team.cta}
                        </a>
                    </div>
                </section>
            );
        }

        // ==========================================================================
        // App
        // ==========================================================================

        const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
            "lang": "en",
            "theme": "auto"
        }/*EDITMODE-END*/;

        function App() {
            const [lang, setLang] = React.useState(TWEAK_DEFAULTS.lang);
            const [theme, setTheme] = React.useState(TWEAK_DEFAULTS.theme);

            React.useEffect(() => {
                const mq = window.matchMedia('(prefers-color-scheme: dark)');
                const apply = () => {
                    const effective = theme === 'auto' ? (mq.matches ? 'dark' : 'light') : theme;
                    document.documentElement.setAttribute('data-theme', effective);
                };
                apply();
                if (theme === 'auto') {
                    mq.addEventListener('change', apply);
                    return () => mq.removeEventListener('change', apply);
                }
            }, [theme]);

            React.useEffect(() => {
                document.documentElement.setAttribute('lang', lang);
            }, [lang]);

            const t = window.COPY[lang] || window.COPY.en;
            const aboutT = ABOUT_COPY[lang] || ABOUT_COPY.en;

            return (
                <div style={{ background: 'var(--b-bg)', minHeight: '100vh', overflow: 'hidden' }}>
                    <window.Header t={t} lang={lang} currentProduct="about" />

                    <main>
                        <AboutHero t={aboutT} />
                        <TextSection
                            id="story"
                            eyebrow={aboutT.story.eyebrow}
                            title={aboutT.story.title}
                            body={aboutT.story.body}
                        />
                        <TextSection
                            id="mission"
                            eyebrow={aboutT.mission.eyebrow}
                            title={aboutT.mission.title}
                            body={aboutT.mission.body}
                        />
                        <EcosystemGrid t={aboutT} />
                        <ValuesGrid t={aboutT} />
                        <TeamSection t={aboutT} />
                        <window.DownloadCTA t={t} />
                    </main>

                    <window.Footer t={t} lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />

                    {/* Tweaks Menu (hidden until activated) */}
                    <window.useTweaks lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
