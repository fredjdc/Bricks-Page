        window.useReveal = function useReveal() {
            const ref = React.useRef(null);
            React.useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const io = new IntersectionObserver((entries) => {
                    entries.forEach(e => {
                        if (e.isIntersecting) {
                            e.target.classList.add('in');
                            io.unobserve(e.target);
                        }
                    });
                }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
                el.querySelectorAll('.reveal').forEach(n => io.observe(n));
                return () => io.disconnect();
            }, []);
            return ref;
        };

        window.smoothScrollTo = function smoothScrollTo(id) {
            const el = document.getElementById(id);
            if (!el) return;
            const y = el.getBoundingClientRect().top + window.scrollY - 24;
            window.scrollTo({ top: y, behavior: 'smooth' });
        };

        window.useScrollDirection = function useScrollDirection() {
            const [state, setState] = React.useState({ dir: 'up', atTop: true });
            React.useEffect(() => {
                let last = window.scrollY;
                const onScroll = () => {
                    const y = window.scrollY;
                    const dir = y > last + 4 ? 'down' : y < last - 4 ? 'up' : state.dir;
                    setState({ dir, atTop: y < 40 });
                    last = y;
                };
                window.addEventListener('scroll', onScroll, { passive: true });
                return () => window.removeEventListener('scroll', onScroll);
            }, []);
            return state;
        };

        window.useIsMobile = function useIsMobile(breakpoint = 768) {
            const [isMobile, setIsMobile] = React.useState(() => window.innerWidth <= breakpoint);
            React.useEffect(() => {
                const mq = window.matchMedia(`(max-width: ${breakpoint}px)`);
                setIsMobile(mq.matches);
                const handler = (e) => setIsMobile(e.matches);
                mq.addEventListener('change', handler);
                return () => mq.removeEventListener('change', handler);
            }, [breakpoint]);
            return isMobile;
        };

        window.useTheme = function useTheme() {
            const [theme, setTheme] = React.useState(
                () => document.documentElement.getAttribute('data-theme') || 'light'
            );
            React.useEffect(() => {
                const observer = new MutationObserver(() => {
                    setTheme(document.documentElement.getAttribute('data-theme') || 'light');
                });
                observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
                return () => observer.disconnect();
            }, []);
            return theme;
        };

            );
            return (
                <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path d="M5.4 7.5h2.4v8.6H5.4zM6.6 3.5c-.8 0-1.4.6-1.4 1.4s.6 1.4 1.4 1.4 1.4-.6 1.4-1.4-.6-1.4-1.4-1.4zM9.4 7.5h2.3v1.2c.3-.6 1.1-1.3 2.3-1.3 2.4 0 2.9 1.6 2.9 3.7v5h-2.4v-4.4c0-1-.02-2.4-1.5-2.4-1.5 0-1.7 1.2-1.7 2.3v4.5H9.4z" /></svg>
            );
        }

        // ==========================================================================
        // Tweaks (edit mode toolbar)
        // ==========================================================================

        window.useTweaks = function useTweaks({ lang, setLang, theme, setTheme }) {
            const [visible, setVisible] = React.useState(false);

            React.useEffect(() => {
                const handler = (e) => {
                    const d = e.data || {};
                    if (d.type === '__activate_edit_mode') setVisible(true);
                    if (d.type === '__deactivate_edit_mode') setVisible(false);
                };
                window.addEventListener('message', handler);
                window.parent.postMessage({ type: '__edit_mode_available' }, '*');
                return () => window.removeEventListener('message', handler);
            }, []);

            if (!visible) return null;

            return (
                <div style={{
                    position: 'fixed', right: 24, bottom: 24, zIndex: 200,
                    background: 'var(--b-bg-elevated)', borderRadius: 24,
                    boxShadow: '0 12px 40px rgba(0,0,0,0.18), var(--emboss-soft)',
                    padding: 20, minWidth: 260,
                    border: '1px solid var(--b-border)',
                }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--b-text-3)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 14 }}>Tweaks</div>
                    <TweakRow label="Language">
                        {['en', 'es'].map(v => (
                            <button key={v} onClick={() => { setLang(v); tweakPersist({ lang: v }); }} style={tweakBtn(lang === v)}>{v.toUpperCase()}</button>
                        ))}
                    </TweakRow>
                    <TweakRow label="Appearance">
                        {[['auto', 'System'], ['light', 'Light'], ['dark', 'Dark']].map(([v, l]) => (
                            <button key={v} onClick={() => { setTheme(v); tweakPersist({ theme: v }); }} style={tweakBtn(theme === v)}>{l}</button>
                        ))}
                    </TweakRow>
                </div>
            );
        };

        function tweakPersist(edits) {
            window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
        }
        function TweakRow({ label, children }) {
            return (
                <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 11, color: 'var(--b-text-2)', marginBottom: 6 }}>{label}</div>
                    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>{children}</div>
                </div>
            );
        }
        function tweakBtn(active) {
            return {
                padding: '6px 12px', borderRadius: 100, border: 'none', cursor: 'pointer',
                fontSize: 12, fontWeight: 600, fontFamily: 'inherit',
                background: active ? 'var(--b-text)' : 'var(--b-bg)',
                color: active ? 'var(--b-bg)' : 'var(--b-text)',
                boxShadow: active ? 'none' : 'var(--emboss-soft)',
            };
        }
    </script>

    <script type="text/babel">
        // ==========================================================================
        // FEEDBACK_COPY — page-specific copy (EN / ES)
        // ==========================================================================

        const FEEDBACK_COPY = {
            en: {
                hero: {
                    eyebrow: 'You\u2019re on the list',
                    title: 'Thank you!',
                    body: 'We will notify you when Bricks Leads is available. Follow us and share to reach more real estate agents.',
                    cta: 'Back to Home',
                    instagram: 'Follow on Instagram',
                    x: 'Follow on X',
                    linkedin: 'Follow on LinkedIn',
                },
            },
            es: {
                hero: {
                    eyebrow: 'Est\u00e1s en la lista',
                    title: '\u00a1Gracias!',
                    body: 'Te avisaremos cuando Bricks Leads est\u00e9 disponible. S\u00edguenos y comparte para llegar a m\u00e1s agentes inmobiliarios.',
                    cta: 'Volver al inicio',
                    instagram: 'Seguir en Instagram',
                    x: 'Seguir en X',
                    linkedin: 'Seguir en LinkedIn',
                },
            },
        };

        // ==========================================================================
        // FeedbackHero
        // ==========================================================================

        function FeedbackHero({ t }) {
            const reveal = window.useReveal();
            const isMobile = window.useIsMobile();
            const [btnHover, setBtnHover] = React.useState(false);
            const [hoverIdx, setHoverIdx] = React.useState(-1);

            const socials = [
                { kind: 'instagram', href: 'https://www.instagram.com/hellobricksapps/', label: t.instagram },
                { kind: 'x', href: 'https://x.com/hellobricksapps', label: t.x },
                { kind: 'linkedin', href: 'https://www.linkedin.com/company/bricksapps/', label: t.linkedin },
            ];

            return (
                <section id="top" ref={reveal} style={{
                    position: 'relative',
                    minHeight: '85vh',
                    display: 'flex', flexDirection: 'column',
                    alignItems: 'center', justifyContent: 'center',
                    overflow: 'hidden', background: 'var(--b-bg)',
                    padding: isMobile ? '120px 20px 80px' : '180px 48px 120px',
                }}>
                    {/* Ambient radial wash */}
                    <div style={{
                        position: 'absolute', inset: 0, pointerEvents: 'none', opacity: 0.45,
                        background: 'radial-gradient(ellipse 600px 350px at 50% 35%, color-mix(in srgb, #34D399 8%, transparent), transparent 70%)',
                    }} />

                    <div className="reveal" style={{
                        position: 'relative', zIndex: 2, maxWidth: 600, margin: '0 auto',
                        textAlign: 'center',
                    }}>
                        {/* Eyebrow */}
                        <div style={{
                            display: 'inline-block', padding: '6px 14px', borderRadius: 100,
                            background: 'var(--b-bg-elevated)', boxShadow: 'var(--emboss-soft)',
                            fontSize: 11, fontWeight: 700, color: 'var(--b-text-3)',
                            letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 32,
                        }}>
                            {t.eyebrow}
                        </div>

                        {/* Checkmark icon */}
                        <div style={{
                            width: 88, height: 88, borderRadius: '50%', margin: '0 auto 36px',
                            background: 'var(--b-bg-elevated)',
                            boxShadow: 'var(--emboss-soft), 0 8px 32px rgba(52,211,153,0.12)',
                            display: 'flex', alignItems: 'center', justifyContent: 'center',
                        }}>
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
                                stroke="#34D399" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                <polyline points="20,6 9,17 4,12" />
                            </svg>
                        </div>

                        {/* Title */}
                        <h1 style={{
                            fontSize: isMobile ? 36 : 52, fontWeight: 900, letterSpacing: '-0.035em',
                            lineHeight: 1.06, margin: '0 0 20px', color: 'var(--b-text)',
                        }}>
                            {t.title}
                        </h1>

                        {/* Body */}
                        <p style={{
                            fontSize: isMobile ? 16 : 18, color: 'var(--b-text-2)',
                            lineHeight: 1.65, margin: '0 auto 40px', maxWidth: 480,
                        }}>
                            {t.body}
                        </p>

                        {/* CTA Button */}
                        <a href="index.html"
                            onClick={() => {
                                if (typeof gtag === 'function') {
                                    gtag('event', 'click', { event_category: 'engagement', event_label: 'back_to_home_button' });
                                }
                            }}
                            onMouseEnter={() => setBtnHover(true)}
                            onMouseLeave={() => setBtnHover(false)}
                            style={{
                                display: 'inline-flex', alignItems: 'center', gap: 8,
                                padding: isMobile ? '14px 28px' : '16px 32px',
                                borderRadius: 100, fontSize: 15, fontWeight: 600,
                                fontFamily: 'inherit', letterSpacing: '-0.01em',
                                background: 'var(--b-text)', color: 'var(--b-bg)',
                                textDecoration: 'none', border: 'none',
                                boxShadow: '0 8px 24px rgba(11,15,20,0.18)',
                                transform: btnHover ? 'translateY(-2px)' : 'translateY(0)',
                                transition: 'transform 0.2s ease, box-shadow 0.2s ease',
                            }}
                        >
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <path d="M13 8H3M6 5L3 8l3 3" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
                            </svg>
                            {t.cta}
                        </a>

                        {/* Social media CTA buttons */}
                        <div style={{
                            display: 'flex', gap: 12, justifyContent: 'center',
                            flexWrap: 'wrap', marginTop: 20,
                        }}>
                            {socials.map((s, i) => (
                                <a key={s.kind} href={s.href}
                                    target="_blank" rel="noopener noreferrer"
                                    onClick={() => {
                                        if (typeof gtag === 'function') {
                                            gtag('event', 'click', { event_category: 'engagement', event_label: `${s.kind}_follow_button` });
                                        }
                                    }}
                                    onMouseEnter={() => setHoverIdx(i)}
                                    onMouseLeave={() => setHoverIdx(-1)}
                                    style={{
                                        display: 'inline-flex', alignItems: 'center', gap: 10,
                                        padding: isMobile ? '12px 20px' : '14px 24px',
                                        borderRadius: 100, fontSize: 14, fontWeight: 600,
                                        fontFamily: 'inherit', letterSpacing: '-0.01em',
                                        background: 'var(--b-bg-elevated)', color: 'var(--b-text)',
                                        textDecoration: 'none', border: '1px solid var(--b-border)',
                                        boxShadow: 'var(--emboss-soft)',
                                        transform: hoverIdx === i ? 'translateY(-2px)' : 'translateY(0)',
                                        transition: 'transform 0.2s ease, box-shadow 0.2s ease',
                                    }}
                                >
                                    <SocialIcon kind={s.kind} />
                                    {s.label}
                                </a>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        // ==========================================================================
        // App
        // ==========================================================================

        const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{ "lang": "en", "theme": "auto" }/*EDITMODE-END*/;

        function App() {
            const [lang, setLang] = React.useState(TWEAK_DEFAULTS.lang);
            const [theme, setTheme] = React.useState(TWEAK_DEFAULTS.theme);

            React.useEffect(() => {
                const mq = window.matchMedia('(prefers-color-scheme: dark)');
                const apply = () => {
                    const effective = theme === 'auto' ? (mq.matches ? 'dark' : 'light') : theme;
                    document.documentElement.setAttribute('data-theme', effective);
                };
                apply();
                if (theme === 'auto') {
                    mq.addEventListener('change', apply);
                    return () => mq.removeEventListener('change', apply);
                }
            }, [theme]);

            React.useEffect(() => {
                document.documentElement.setAttribute('lang', lang);
            }, [lang]);

            const t = window.COPY[lang] || window.COPY.en;
            const pageT = FEEDBACK_COPY[lang] || FEEDBACK_COPY.en;

            return (
                <div style={{ background: 'var(--b-bg)', minHeight: '100vh', overflow: 'hidden' }}>
                    <window.Header t={t} lang={lang} currentProduct="thank-you-feedback" />

                    <main>
                        <FeedbackHero t={pageT.hero} />
                    </main>

                    <window.Footer t={t} lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />

                    {/* Tweaks Menu (hidden until activated) */}
                    <window.useTweaks lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
