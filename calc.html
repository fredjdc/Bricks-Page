    window.useReveal = function useReveal() {
      const ref = React.useRef(null);
      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('in');
              io.unobserve(e.target);
            }
          });
        }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
        el.querySelectorAll('.reveal').forEach(n => io.observe(n));
        return () => io.disconnect();
      }, []);
      return ref;
    };

    window.useCountUp = function useCountUp(target, when, durationMs = 1400) {
      const [val, setVal] = React.useState(0);
      React.useEffect(() => {
        if (!when) return;
        let raf;
        const start = performance.now();
        const tick = (now) => {
          const t = Math.min(1, (now - start) / durationMs);
          const eased = 1 - Math.pow(1 - t, 3);
          setVal(Math.floor(eased * target));
          if (t < 1) raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [when, target]);
      return val;
    };

    window.smoothScrollTo = function smoothScrollTo(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const y = el.getBoundingClientRect().top + window.scrollY - 24;
      window.scrollTo({ top: y, behavior: 'smooth' });
    };

    window.useScrollDirection = function useScrollDirection() {
      const [state, setState] = React.useState({ dir: 'up', atTop: true });
      React.useEffect(() => {
        let last = window.scrollY;
        const onScroll = () => {
          const y = window.scrollY;
          const dir = y > last + 4 ? 'down' : y < last - 4 ? 'up' : state.dir;
          setState({ dir, atTop: y < 40 });
          last = y;
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      return state;
    };

    window.useIsMobile = function useIsMobile(breakpoint = 768) {
      const [isMobile, setIsMobile] = React.useState(() => window.innerWidth <= breakpoint);
      React.useEffect(() => {
        const mq = window.matchMedia(`(max-width: ${breakpoint}px)`);
        setIsMobile(mq.matches);
        const handler = (e) => setIsMobile(e.matches);
        mq.addEventListener('change', handler);
        return () => mq.removeEventListener('change', handler);
      }, [breakpoint]);
      return isMobile;
    };

    window.useTheme = function useTheme() {
      const [theme, setTheme] = React.useState(
        () => document.documentElement.getAttribute('data-theme') || 'light'

      React.useEffect(() => {
        const observer = new MutationObserver(() => {
          setTheme(document.documentElement.getAttribute('data-theme') || 'light');
        });
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
        return () => observer.disconnect();
      }, []);
      return theme;
    };

    window.ScreenshotPhone = function ScreenshotPhone({ src, alt, accent, tilt = 0 }) {
      const ref = React.useRef(null);
      const [y, setY] = React.useState(0);
      const isMobile = window.useIsMobile();

      React.useEffect(() => {
        let raf = 0;
        const onScroll = () => {
          if (raf) return;
          raf = requestAnimationFrame(() => {
            raf = 0;
            const el = ref.current;
            if (!el) return;
            const rect = el.getBoundingClientRect();
            const vh = window.innerHeight;
            const progress = (vh * 0.5 - (rect.top + rect.height * 0.5)) / vh;
            setY(Math.max(-1, Math.min(1, progress)));
          });
        };
        onScroll();
        window.addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('resize', onScroll);
        return () => {
          window.removeEventListener('scroll', onScroll);
          window.removeEventListener('resize', onScroll);
          if (raf) cancelAnimationFrame(raf);
        };
      }, []);

      const translateY = -y * 40;

      return (
        <div ref={ref} style={{
          position: 'relative',
          display: 'flex', justifyContent: 'center', alignItems: 'center',
          perspective: 1800,
          minHeight: isMobile ? 360 : 640,
        }}>
          <div aria-hidden="true" style={{
            position: 'absolute', inset: '10% 15%',
            background: `radial-gradient(ellipse at 50% 55%, ${accent}22 0%, ${accent}10 35%, transparent 70%)`,
            filter: 'blur(40px)',
            pointerEvents: 'none',
            transform: `translateY(${translateY * 0.5}px)`,
            transition: 'transform 0.05s linear',
          }} />
          <img
            src={src + (window.location.search || '')}
            alt={alt}
            style={{
              width: isMobile ? '100%' : 340,
              maxWidth: isMobile ? 280 : 'none',
              height: 'auto',
              display: 'block',
              borderRadius: 48,
              transform: `translateY(${translateY}px) rotate(${tilt}deg)`,
              transition: 'transform 0.05s linear',
              boxShadow: '0 2px 4px rgba(0,0,0,0.04), 0 12px 24px rgba(0,0,0,0.08), 0 40px 80px rgba(0,0,0,0.12), 0 80px 140px rgba(0,0,0,0.14)',
              willChange: 'transform',
            }}
          />
        </div>
      );
    };

    window.useTweaks = function useTweaks({ lang, setLang, theme, setTheme }) {
      const [visible, setVisible] = React.useState(false);

      React.useEffect(() => {
        const handler = (e) => {
          const d = e.data || {};
          if (d.type === '__activate_edit_mode') setVisible(true);
          if (d.type === '__deactivate_edit_mode') setVisible(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handler);
      }, []);

      if (!visible) return null;

      return (
        <div style={{
          position: 'fixed', right: 24, bottom: 24, zIndex: 200,
          background: 'var(--b-bg-elevated)', borderRadius: 24,
          boxShadow: '0 12px 40px rgba(0,0,0,0.18), var(--emboss-soft)',
          padding: 20, minWidth: 260,
          border: '1px solid var(--b-border)',
        }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--b-text-3)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 14 }}>Tweaks</div>
          <TweakRow label="Language">
            {['en', 'es'].map(v => (
              <button key={v} onClick={() => { setLang(v); tweakPersist({ lang: v }); }} style={tweakBtn(lang === v)}>{v.toUpperCase()}</button>
            ))}
          </TweakRow>
          <TweakRow label="Appearance">
            {[['auto', 'System'], ['light', 'Light'], ['dark', 'Dark']].map(([v, l]) => (
              <button key={v} onClick={() => { setTheme(v); tweakPersist({ theme: v }); }} style={tweakBtn(theme === v)}>{l}</button>
            ))}
          </TweakRow>
        </div>
      );
    };

    function tweakPersist(edits) {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');

    function TweakRow({ label, children }) {
      return (
        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 11, color: 'var(--b-text-2)', marginBottom: 6 }}>{label}</div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>{children}</div>
        </div>
      );
    }
    function tweakBtn(active) {

        padding: '6px 12px', borderRadius: 100, border: 'none', cursor: 'pointer',

                      padding: isMobile ? '14px 26px' : '16px 32px',
                      background: CALC_ACCENT,
                      color: '#fff', textDecoration: 'none',
                      border: 'none', borderRadius: 100, fontSize: 15, fontWeight: 600,
                      fontFamily: 'inherit', letterSpacing: '-0.01em',
                      boxShadow: '0 12px 28px rgba(0,122,255,0.25)',
                      transition: 'transform 0.15s ease',
                    }}
                    onMouseEnter={(e) => { e.currentTarget.style.transform = 'translateY(-2px)'; }}
                    onMouseLeave={(e) => { e.currentTarget.style.transform = 'translateY(0)'; }}
                  >
                    {t.hero.cta}

                  <p style={{

                  }}>

              </div>
            </div>

            {!isMobile && (
              <div className="reveal reveal-d2">
                <window.ScreenshotVideo
                  src={videoSrc}

          </div>

          {isMobile && (
            <div className="reveal reveal-d3" style={{ marginTop: 48 }}>
              <window.ScreenshotVideo
                src={videoSrc}
                posterSrc={posterSrc}
                alt="Bricks Calc interface"

                lang={lang}
              />
            </div>
          )}
        </section>
      );
    }

    // ==========================================================================
    // CalcStats
    // ==========================================================================

    function CalcStats({ t }) {
      const reveal = window.useReveal();
      const isMobile = window.useIsMobile();
      const [visible, setVisible] = React.useState(false);
      const bandRef = React.useRef(null);

      React.useEffect(() => {
        const el = bandRef.current;
        if (!el) return;
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) { setVisible(true); io.unobserve(e.target); } });
        }, { threshold: 0.3 });
        io.observe(el);
        return () => io.disconnect();
      }, []);

      return (
        <section ref={reveal} style={{
          padding: isMobile ? '40px 20px' : '80px 48px',
          maxWidth: 1200, margin: '0 auto',
        }}>
          <div className="reveal" style={{ textAlign: 'center', marginBottom: isMobile ? 32 : 48 }}>
            <div style={{ ...window.eyebrowStyle, color: CALC_ACCENT }}>{t.stats.eyebrow}</div>
            <h2 style={{
              fontSize: isMobile ? 32 : 44, fontWeight: 900, letterSpacing: '-0.035em',
              lineHeight: 1.05, margin: '0 0 12px', color: 'var(--b-text)',
            }}>{t.stats.title}</h2>
            <p style={{ fontSize: 16, color: 'var(--b-text-2)', margin: 0 }}>{t.stats.sub}</p>
          </div>

          <div ref={bandRef} className="reveal reveal-d1" style={{
            display: 'grid',
            gridTemplateColumns: isMobile ? '1fr' : 'repeat(3, 1fr)',
            gap: isMobile ? 16 : 24,
            background: 'var(--b-bg-elevated)',
            borderRadius: isMobile ? 32 : 48,
            padding: isMobile ? '28px 24px' : '48px 32px',
            boxShadow: 'var(--emboss-soft)',
          }}>
            {t.stats.items.map((item, i) => (
              <StatCell key={i} item={item} visible={visible} />
            ))}
          </div>
        </section>
      );
    }

    function StatCell({ item, visible }) {
      const v = window.useCountUp(item.v, visible);
      return (
        <div style={{ textAlign: 'center', padding: '12px 8px' }}>
          <div style={{
            fontSize: 48, fontWeight: 900, letterSpacing: '-0.035em',
            color: CALC_ACCENT, lineHeight: 1,
          }}>
            {window.fmtNum(v)}{item.suffix === '+' ? '+' : item.suffix === '%' ? '' : item.suffix}
          </div>
          <div style={{ marginTop: 10, fontSize: 14, color: 'var(--b-text-2)' }}>{item.l}</div>
        </div>
      );
    }

    // ==========================================================================
    // CalcPillars
    // ==========================================================================

    function CalcPillars({ t }) {
      const reveal = window.useReveal();
      const isMobile = window.useIsMobile();
      return (
        <section ref={reveal} style={{
          padding: isMobile ? '56px 20px' : '120px 48px',
          maxWidth: 1200, margin: '0 auto',
        }}>
          <div style={{
            display: 'grid',
            gridTemplateColumns: isMobile ? '1fr' : '1fr 1.2fr',
            gap: isMobile ? 32 : 80,
            alignItems: 'start', marginBottom: isMobile ? 40 : 64,
          }}>
            <div className="reveal">
              <div style={{ ...window.eyebrowStyle, color: CALC_ACCENT }}>{t.pillars.eyebrow}</div>
              <h2 style={{
                fontSize: isMobile ? 36 : 56, fontWeight: 900, letterSpacing: '-0.035em',
                lineHeight: 1.02, margin: 0, color: 'var(--b-text)',
              }}>
                {t.pillars.title[0]}<br />
                <span style={{ color: 'var(--b-text-2)' }}>{t.pillars.title[1]}</span>
              </h2>
            </div>
            <p className="reveal reveal-d1" style={{
              fontSize: 18, lineHeight: 1.6, color: 'var(--b-text-2)', margin: 0,
            }}>{t.pillars.body}</p>
          </div>

          <div style={{
            display: 'grid',
            gridTemplateColumns: isMobile ? '1fr' : 'repeat(3, 1fr)',
            gap: isMobile ? 16 : 24,
          }}>
            {t.pillars.items.map((p, i) => (
              <div key={i} className={`reveal reveal-d${i + 1}`} style={{
                background: 'var(--b-bg-elevated)', borderRadius: 32,
                padding: isMobile ? 28 : 36,
                boxShadow: 'var(--emboss-soft)',
                border: '1px solid var(--b-border)',
              }}>
                <div style={{
                  width: 36, height: 36, borderRadius: 12,
                  background: `${CALC_ACCENT}1a`,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  marginBottom: 20,
                }}>
                  <div style={{ width: 10, height: 10, borderRadius: 5, background: CALC_ACCENT }} />
                </div>
                <div style={{ fontSize: 20, fontWeight: 700, color: 'var(--b-text)', marginBottom: 8, letterSpacing: '-0.01em' }}>{p.t}</div>
                <div style={{ fontSize: 15, color: 'var(--b-text-2)', lineHeight: 1.55 }}>{p.d}</div>
              </div>
            ))}
          </div>
        </section>

    // ==========================================================================
    // CalcFeatureSplit
    // ==========================================================================

    function CalcFeatureSplit({ feature, reverse, shotSrc }) {
      const reveal = window.useReveal();
      const isMobile = window.useIsMobile();
      return (
        <section ref={reveal} style={{
          padding: isMobile ? '56px 20px' : '96px 48px',
          maxWidth: 1280, margin: '0 auto',
        }}>
          <div style={{
            display: 'grid',
            gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr',
            gap: isMobile ? 40 : 96,
            alignItems: 'center',
            direction: reverse && !isMobile ? 'rtl' : 'ltr',
          }}>
            <div className="reveal" style={{ direction: 'ltr' }}>
              <div style={{ ...window.eyebrowStyle, color: CALC_ACCENT }}>{feature.eyebrow}</div>
              <h2 style={{
                fontSize: isMobile ? 36 : 52, fontWeight: 900, letterSpacing: '-0.035em',
                lineHeight: 1.02, margin: '0 0 20px', color: 'var(--b-text)',
              }}>
                {feature.title[0]}<br />
                <span style={{ color: 'var(--b-text-2)' }}>{feature.title[1]}</span>
              </h2>
              <p style={{ ...window.leadP, marginBottom: 28 }}>{feature.body}</p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
                {feature.bullets.map((b, i) => (
                  <window.Bullet key={i} accent={CALC_ACCENT} t={b.t} d={b.d} />
                ))}
              </div>
            </div>
            <div className="reveal reveal-d1" style={{ direction: 'ltr' }}>
              <window.ScreenshotPhone src={shotSrc} alt={feature.title.join(' ')} accent={CALC_ACCENT} tilt={reverse ? 1.5 : -1.5} />
            </div>
          </div>
        </section>
      );
    }

    // ==========================================================================
    // CalcTestimonials
    // ==========================================================================

    function CalcTestimonials({ t }) {
      const reveal = window.useReveal();
      const isMobile = window.useIsMobile();
      return (
        <section ref={reveal} style={{
          padding: isMobile ? '56px 20px' : '120px 48px',
          maxWidth: 1280, margin: '0 auto',
        }}>
          <div className="reveal" style={{ textAlign: 'center', marginBottom: isMobile ? 32 : 56 }}>
            <div style={{ ...window.eyebrowStyle, color: CALC_ACCENT }}>{t.testimonials.eyebrow}</div>
            <p style={{ fontSize: 16, color: 'var(--b-text-2)', margin: 0, maxWidth: 520, marginLeft: 'auto', marginRight: 'auto' }}>{t.testimonials.sub}</p>
          </div>
          <div style={{
            display: 'grid',
            gridTemplateColumns: isMobile ? '1fr' : 'repeat(3, 1fr)',
            gap: isMobile ? 16 : 24,
          }}>
            {t.testimonials.quotes.map((q, i) => (
              <figure key={i} className={`reveal reveal-d${i + 1}`} style={{
                background: 'var(--b-bg-elevated)', borderRadius: 32,
                padding: isMobile ? 28 : 36,
                boxShadow: 'var(--emboss-soft)',
                border: '1px solid var(--b-border)',
                margin: 0,
                display: 'flex', flexDirection: 'column', gap: 20,
              }}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0, opacity: 0.6 }}>
                  <path d="M6 11c0-3 2-5 5-5v2c-2 0-3 1-3 3h3v5H6V11zm8 0c0-3 2-5 5-5v2c-2 0-3 1-3 3h3v5h-5V11z" fill={CALC_ACCENT} />
                </svg>
                <blockquote style={{
                  margin: 0, fontSize: isMobile ? 16 : 17, lineHeight: 1.5,
                  color: 'var(--b-text)', letterSpacing: '-0.005em', flex: 1,
                }}>{q.q}</blockquote>
                <figcaption style={{ fontSize: 14, color: 'var(--b-text-2)', lineHeight: 1.5 }}>
                  <div style={{ fontWeight: 600, color: 'var(--b-text)' }}>{q.n}</div>
                  <div>{q.r} · {q.c}</div>
                </figcaption>
              </figure>
            ))}
          </div>
        </section>
      );
    }

    // ==========================================================================
    // CalcFAQ
    // ==========================================================================

    function CalcFAQ({ t }) {
      const reveal = window.useReveal();
      const isMobile = window.useIsMobile();
      const [open, setOpen] = React.useState(0);
      return (
        <section ref={reveal} style={{
          padding: isMobile ? '56px 20px' : '120px 48px',
          maxWidth: 960, margin: '0 auto',
        }}>
          <div className="reveal" style={{ marginBottom: isMobile ? 32 : 48 }}>
            <div style={{ ...window.eyebrowStyle, color: CALC_ACCENT }}>{t.faq.eyebrow}</div>
            <h2 style={{
              fontSize: isMobile ? 36 : 52, fontWeight: 900, letterSpacing: '-0.035em',
              lineHeight: 1.02, margin: 0, color: 'var(--b-text)',
            }}>{t.faq.title}</h2>
          </div>
          <div className="reveal reveal-d1" style={{
            background: 'var(--b-bg-elevated)', borderRadius: 32,
            boxShadow: 'var(--emboss-soft)',
            border: '1px solid var(--b-border)',
            overflow: 'hidden',
          }}>
            {t.faq.items.map((item, i) => {
              const isOpen = open === i;
              return (
                <div key={i} style={{
                  borderTop: i === 0 ? 'none' : '1px solid var(--b-border)',
                }}>
                  <button
                    onClick={() => setOpen(isOpen ? -1 : i)}
                    style={{
                      width: '100%', textAlign: 'left', background: 'transparent',
                      border: 'none', cursor: 'pointer', fontFamily: 'inherit',
                      padding: isMobile ? '20px 24px' : '24px 32px',
                      display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 16,
                      fontSize: isMobile ? 16 : 17, fontWeight: 600, color: 'var(--b-text)',
                      letterSpacing: '-0.01em',
                    }}
                  >
                    <span>{item.q}</span>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{
                      flexShrink: 0,
                      transform: isOpen ? 'rotate(180deg)' : 'rotate(0)',
                      transition: 'transform 0.3s cubic-bezier(0.16,1,0.3,1)',
                    }}>
                      <path d="M3 5.5L7 9.5L11 5.5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
                    </svg>
                  </button>
                  <div style={{
                    maxHeight: isOpen ? 400 : 0,
                    overflow: 'hidden',
                    transition: 'max-height 0.35s cubic-bezier(0.16,1,0.3,1)',
                  }}>
                    <div style={{
                      padding: isMobile ? '0 24px 22px' : '0 32px 28px',
                      fontSize: 15, lineHeight: 1.6, color: 'var(--b-text-2)',
                      maxWidth: 720,
                    }}>{item.a}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </section>
      );
    }

    // ==========================================================================
    // CalcEcosystem
    // ==========================================================================

    function CalcEcosystem({ t }) {
      const reveal = window.useReveal();
      const isMobile = window.useIsMobile();
      return (
        <section ref={reveal} style={{
          padding: isMobile ? '56px 20px' : '120px 48px',
          maxWidth: 1200, margin: '0 auto',
        }}>
          <div className="reveal" style={{ textAlign: 'center', marginBottom: isMobile ? 32 : 48 }}>
            <div style={{ ...window.eyebrowStyle, color: CALC_ACCENT }}>{t.ecosystem.eyebrow}</div>
            <h2 style={{
              fontSize: isMobile ? 32 : 44, fontWeight: 900, letterSpacing: '-0.035em',
              lineHeight: 1.05, margin: '0 0 12px', color: 'var(--b-text)',
            }}>{t.ecosystem.title}</h2>
            <p style={{ fontSize: 16, color: 'var(--b-text-2)', margin: 0, maxWidth: 520, marginLeft: 'auto', marginRight: 'auto' }}>{t.ecosystem.sub}</p>
          </div>
          <div style={{
            display: 'grid',
            gridTemplateColumns: isMobile ? '1fr' : 'repeat(3, 1fr)',
            gap: isMobile ? 16 : 20,
          }}>
            {t.ecosystem.items.map((it, i) => {
              const accent = window.ACCENTS[it.id].light;
              return (
                <a key={i} href={it.href} className={`reveal reveal-d${i + 1}`} style={{
                  background: 'var(--b-bg-elevated)', borderRadius: 28,
                  padding: isMobile ? 24 : 32,
                  boxShadow: 'var(--emboss-soft)',
                  border: `1px solid ${it.active ? accent + '55' : 'var(--b-border)'}`,
                  display: 'flex', flexDirection: 'column', gap: 14,
                  textDecoration: 'none',
                  transition: 'transform 0.2s ease',
                  position: 'relative',
                }}
                  onMouseEnter={(e) => { if (!it.active) e.currentTarget.style.transform = 'translateY(-3px)'; }}
                  onMouseLeave={(e) => { e.currentTarget.style.transform = 'translateY(0)'; }}
                >
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div style={{ width: 12, height: 12, borderRadius: 6, background: accent }} />
                    <div style={{ fontSize: 17, fontWeight: 700, color: 'var(--b-text)', letterSpacing: '-0.01em' }}>{it.name}</div>
                    {it.active && (
                      <span style={{
                        marginLeft: 'auto', fontSize: 11, fontWeight: 700,
                        color: accent, letterSpacing: '0.08em', textTransform: 'uppercase',
                      }}>Now</span>
                    )}
                  </div>
                  <div style={{ fontSize: 15, color: 'var(--b-text-2)', lineHeight: 1.5 }}>{it.tagline}</div>
                </a>
              );
            })}
          </div>
        </section>
      );
    }

    // ==========================================================================
    // App
    // ==========================================================================

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "lang": "en",
      "theme": "auto"
    }/*EDITMODE-END*/;

    function App() {
      const [lang, setLang] = React.useState(TWEAK_DEFAULTS.lang);
      const [theme, setTheme] = React.useState(TWEAK_DEFAULTS.theme);

      React.useEffect(() => {
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        const apply = () => {
          const effective = theme === 'auto' ? (mq.matches ? 'dark' : 'light') : theme;
          document.documentElement.setAttribute('data-theme', effective);
        };
        apply();
        if (theme === 'auto') {
          mq.addEventListener('change', apply);
          return () => mq.removeEventListener('change', apply);
        }
      }, [theme]);

      React.useEffect(() => {
        document.documentElement.setAttribute('lang', lang);
      }, [lang]);

      const effectiveTheme = window.useTheme();
      const t = window.COPY[lang] || window.COPY.en;
      const calcT = CALC_COPY[lang] || CALC_COPY.en;

      // Note: feature images are language-specific. Using standard ones we know exist from images folder.
      const shot1 = lang === 'en' ? 'images/feature-en-01.jpg' : 'images/feature-es-01.jpg';
      const shot2 = lang === 'en' ? 'images/feature-en-03.jpg' : 'images/feature-es-03.jpg';

      return (
        <div style={{ background: 'var(--b-bg)', minHeight: '100vh', overflow: 'hidden' }}>
          <window.Header 
            t={t} 
            lang={lang} 
            currentProduct="calc" 
            cta={{ 
              label: t.nav.download, 
              href: 'https://apps.apple.com/us/app/bricks-calc-loan-calculator/id6754506837' 
            }} 
          />
          
          <main>
            <CalcHero t={calcT} lang={lang} theme={effectiveTheme} />
            <CalcStats t={calcT} />
            <CalcPillars t={calcT} />
            <CalcFeatureSplit feature={calcT.feature1} reverse={false} shotSrc={shot1} />
            <CalcFeatureSplit feature={calcT.feature2} reverse={true} shotSrc={shot2} />
            <CalcTestimonials t={calcT} />
            <window.DownloadCTA t={t} variant="default" />
            <CalcFAQ t={calcT} />
            <CalcEcosystem t={calcT} />
          </main>

          <window.Footer t={t} lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />
          
          {/* Tweaks Menu (hidden in production unless activated) */}
          <window.useTweaks lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>

</html>
