<!DOCTYPE html><html><head><meta charset="utf-8"><title>Colors — Text</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:22px;font-family:var(--bricks-font-stack);background:var(--bricks-bg-primary)}
.row{display:flex;flex-direction:column;gap:10px}
.line{display:flex;align-items:center;gap:16px;padding:12px 16px;background:#FFFFFF;border-radius:12px;box-shadow:var(--bricks-emboss-soft)}
.dot{width:22px;height:22px;border-radius:6px;flex-shrink:0}
.label{font-weight:600;font-size:15px;width:160px}
.hex{font-family:var(--bricks-font-mono);font-size:12px;color:var(--bricks-text-secondary);width:180px}
.sample{font-size:15px}
</style></head><body>
<div class="row">
  <div class="line"><span class="dot" style="background:#0B0F14"></span><span class="label" style="color:#0B0F14">text-primary</span><span class="hex">#0B0F14</span><span class="sample" style="color:#0B0F14">Scan documents. Find them fast.</span></div>
  <div class="line"><span class="dot" style="background:#55626E"></span><span class="label" style="color:#55626E">text-secondary</span><span class="hex">#55626E</span><span class="sample" style="color:#55626E">Every scan gets a clear name.</span></div>
  <div class="line"><span class="dot" style="background:rgba(11,15,20,.38)"></span><span class="label" style="color:rgba(11,15,20,.6)">text-tertiary</span><span class="hex">rgba(11,15,20,.38)</span><span class="sample" style="color:rgba(11,15,20,.38)">Disabled · last edited 2h ago</span></div>
</div>
</body></html>
