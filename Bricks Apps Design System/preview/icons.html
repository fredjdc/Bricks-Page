<!DOCTYPE html><html><head><meta charset="utf-8"><title>Iconography</title>
<style>
body{margin:0;padding:24px;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#F6F7F8;color:#0B0F14}
.row{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.cell{background:#F6F7F8;border-radius:12px;box-shadow:4px 6px 16px #E7ECEF,-2px -2px 6px #fff;padding:12px;display:flex;align-items:center;justify-content:center;height:72px}
img{max-height:44px;max-width:100%}
.cap{font-size:10px;font-family:ui-monospace,SF Mono,monospace;color:#55626E;text-align:center;margin-top:4px}
.col{display:flex;flex-direction:column}
</style></head><body>
<div class="row">
  <div class="col"><div class="cell"><img src="../assets/feature-icon-01.svg"></div><div class="cap">01</div></div>
  <div class="col"><div class="cell"><img src="../assets/feature-icon-02.svg"></div><div class="cap">02</div></div>
  <div class="col"><div class="cell"><img src="../assets/feature-icon-03.svg"></div><div class="cap">03</div></div>
  <div class="col"><div class="cell"><img src="../assets/feature-icon-04.svg"></div><div class="cap">04</div></div>
  <div class="col"><div class="cell"><img src="../assets/feature-icon-05.svg"></div><div class="cap">05</div></div>
  <div class="col"><div class="cell"><img src="../assets/feature-icon-06.svg"></div><div class="cap">06</div></div>
  <div class="col"><div class="cell"><img src="../assets/feature-icon-07.svg"></div><div class="cap">07</div></div>
</div>
</body></html>
