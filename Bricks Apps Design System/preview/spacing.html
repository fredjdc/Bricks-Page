<!DOCTYPE html><html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;font-family:var(--bricks-font-stack);background:#F6F7F8}
.row{display:flex;flex-direction:column;gap:10px}
.bar{display:flex;align-items:center;gap:14px}
.tok{font-family:var(--bricks-font-mono);font-size:11px;color:var(--bricks-text-secondary);width:110px}
.fill{height:14px;background:#0B0F14;border-radius:4px}
.v{font-family:var(--bricks-font-mono);font-size:11px;color:var(--bricks-text-secondary)}
</style></head><body>
<div class="row">
  <div class="bar"><div class="tok">space-xs</div><div class="fill" style="width:8px"></div><div class="v">8</div></div>
  <div class="bar"><div class="tok">space-s</div><div class="fill" style="width:16px"></div><div class="v">16</div></div>
  <div class="bar"><div class="tok">space-sm</div><div class="fill" style="width:32px"></div><div class="v">32</div></div>
  <div class="bar"><div class="tok">space-md</div><div class="fill" style="width:64px"></div><div class="v">64</div></div>
  <div class="bar"><div class="tok">space-lg</div><div class="fill" style="width:96px"></div><div class="v">96</div></div>
  <div class="bar"><div class="tok">space-xl</div><div class="fill" style="width:120px"></div><div class="v">120</div></div>
</div>
</body></html>
