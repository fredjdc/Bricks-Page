<!DOCTYPE html><html><head><meta charset="utf-8"><title>Feature Item</title>
<style>
body{margin:0;padding:24px;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#F6F7F8;color:#0B0F14}
.label{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.icon{width:48px;height:48px;border-radius:12px;box-shadow:4px 6px 16px #E7ECEF,-2px -2px 6px #fff;background:#fff;display:flex;align-items:center;justify-content:center}
.icon img{width:28px;height:28px}
.name{font-size:18px;font-weight:600}
.tri{display:flex;flex-direction:column;gap:16px}
.item{display:flex;gap:14px;align-items:flex-start}
.dot{width:6px;height:6px;border-radius:50%;background:#00A6A1;margin-top:8px;flex-shrink:0}
.t{font-size:16px;font-weight:600;margin:0 0 3px}
.d{font-size:14px;color:#55626E;margin:0;line-height:1.5}
</style></head><body>
<div class="label"><div class="icon"><img src="../assets/feature-icon-03.svg"></div><div class="name">Bricks Scan</div></div>
<div class="tri">
  <div class="item"><span class="dot"></span><div><p class="t">Auto-Sort</p><p class="d">Every file gets a clear name and the right folder. You don't decide.</p></div></div>
  <div class="item"><span class="dot"></span><div><p class="t">Instant Search</p><p class="d">Find any name, address, or clause inside any document.</p></div></div>
  <div class="item"><span class="dot"></span><div><p class="t">Private by design</p><p class="d">Processed on your iPhone. Nothing is uploaded.</p></div></div>
</div>
</body></html>
