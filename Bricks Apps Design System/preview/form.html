<!DOCTYPE html><html><head><meta charset="utf-8"><title>Form</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;font-family:var(--bricks-font-stack);background:#F6F7F8;color:#0B0F14}
.row{display:flex;gap:16px;flex-wrap:wrap}
.field{flex:1;min-width:220px}
label{display:block;font-size:14px;font-weight:500;margin-bottom:8px}
.in{width:100%;padding:14px 18px;font-size:16px;font-family:inherit;color:#0B0F14;background:#F6F7F8;border:1px solid #E7ECEF;border-radius:24px;box-shadow:var(--bricks-emboss-recessed);outline:none;box-sizing:border-box}
.in.focus{border-color:#00A6A1;box-shadow:var(--bricks-emboss-recessed),0 0 0 3px rgba(0,166,161,.12)}
.drop{border:2px dashed #C9D3DA;border-radius:24px;padding:22px;text-align:center;font-size:14px;color:#55626E;background:#F6F7F8;box-shadow:var(--bricks-emboss-recessed)}
</style></head><body>
<div class="row">
  <div class="field"><label>Email</label><input class="in" placeholder="you@brokerage.com"></div>
  <div class="field"><label>Your name</label><input class="in focus" value="Mariana Soto"></div>
</div>
<div style="margin-top:14px"><label>Attach</label><div class="drop">Drop a file, or tap to choose</div></div>
</body></html>
