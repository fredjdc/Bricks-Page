<!DOCTYPE html><html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;font-family:var(--bricks-font-stack);background:#F6F7F8;color:#0B0F14}
.card{background:#F6F7F8;border-radius:48px;box-shadow:var(--bricks-emboss-raised);padding:28px;border:1px solid rgba(255,255,255,.4);max-width:560px}
.label{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(11,15,20,.5);display:flex;align-items:center;gap:8px;margin-bottom:12px}
.dot{width:6px;height:6px;border-radius:50%;background:#00A6A1}
h3{margin:0 0 6px;font-size:22px;font-weight:600;letter-spacing:-.01em}
p{margin:0;font-size:15px;color:#55626E;line-height:1.55}
.foot{margin-top:16px;display:flex;gap:8px;align-items:center;font-size:12px;color:rgba(11,15,20,.5);font-family:var(--bricks-font-mono)}
</style></head><body>
<div class="card">
  <div class="label"><span class="dot"></span>Bricks Scan</div>
  <h3>Every scan gets a clear name.</h3>
  <p>Auto-Sort reads the document, suggests a folder, and files it — without asking. Works on device.</p>
  <div class="foot">r3-primary · 48 · emboss-raised</div>
</div>
</body></html>
