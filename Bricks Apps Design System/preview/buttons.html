<!DOCTYPE html><html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;font-family:var(--bricks-font-stack);background:#F6F7F8}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 28px;min-width:150px;height:56px;border-radius:24px;font-size:16px;font-weight:500;font-family:inherit;border:none;cursor:pointer;line-height:1;background:#F6F7F8;color:#0B0F14;box-shadow:var(--bricks-emboss-raised)}
.btn-primary{background:#0B0F14;color:#F6F7F8;font-weight:600;box-shadow:0 12px 32px rgba(11,15,20,.24), 0 4px 8px rgba(11,15,20,.12);border:1px solid rgba(255,255,255,.1)}
.btn-secondary{color:#55626E;box-shadow:6px 6px 12px #E7ECEF,-6px -6px 12px #fff}
.btn-accent{background:#0B0F14;color:#fff;font-weight:600;box-shadow:0 10px 24px rgba(0,166,161,.2), 0 4px 8px rgba(11,15,20,.12)}
.btn-press{box-shadow:var(--bricks-emboss-recessed);transform:scale(.97)}
</style></head><body>
<div class="row">
  <button class="btn btn-primary">Explore the suite ↓</button>
  <button class="btn btn-secondary">Learn more</button>
  <button class="btn">Cancel</button>
  <button class="btn btn-press">Pressed</button>
</div>
</body></html>
