<!DOCTYPE html><html><head><meta charset="utf-8"><title>Header</title>
<style>
body{margin:0;padding:30px 24px;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#F6F7F8;color:#0B0F14}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:rgba(255,255,255,.65);backdrop-filter:blur(20px);border-radius:100px;border:1px solid rgba(255,255,255,.4);box-shadow:0 8px 32px rgba(11,15,20,.04),inset 0 0 0 1px rgba(255,255,255,.3)}
.logo img{height:22px;opacity:.9}
.globe{width:38px;height:38px;border-radius:50%;background:#F6F7F8;box-shadow:6px 6px 12px #E7ECEF,-6px -6px 12px #fff;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.4)}
.globe img{width:18px;height:18px;opacity:.8}
</style></head><body>
<div class="header">
  <div class="logo"><img src="../assets/bricks-dark-logo.svg" alt="Bricks"></div>
  <div class="globe"><img src="../assets/globe-icon.svg" alt="Language"></div>
</div>
</body></html>
