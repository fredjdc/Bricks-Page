<!DOCTYPE html><html><head><meta charset="utf-8"><title>Colors — Neutral</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;font-family:var(--bricks-font-stack);background:var(--bricks-bg-primary);color:var(--bricks-text-primary)}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.swatch{border-radius:16px;height:92px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-shadow:var(--bricks-emboss-soft)}
.swatch .name{font-size:12px;font-weight:600;letter-spacing:.01em}
.swatch .hex{font-family:var(--bricks-font-mono);font-size:11px;color:var(--bricks-text-secondary);margin-top:2px}
.dark{color:#fff}
.dark .hex{color:rgba(255,255,255,.6)}
</style></head><body>
<div class="row">
  <div class="swatch" style="background:#F6F7F8"><div class="name">bg-primary</div><div class="hex">#F6F7F8</div></div>
  <div class="swatch" style="background:#FFFFFF"><div class="name">bg-white</div><div class="hex">#FFFFFF</div></div>
  <div class="swatch" style="background:#E7ECEF"><div class="name">surface-shadow</div><div class="hex">#E7ECEF</div></div>
  <div class="swatch" style="background:#C9D3DA"><div class="name">depth-plane</div><div class="hex">#C9D3DA</div></div>
  <div class="swatch dark" style="background:#9AA7B2"><div class="name">edge-def</div><div class="hex">#9AA7B2</div></div>
</div>
</body></html>
