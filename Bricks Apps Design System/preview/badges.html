<!DOCTYPE html><html><head><meta charset="utf-8"><title>Badge</title>
<style>
body{margin:0;padding:24px;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#F6F7F8;color:#0B0F14;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.b{display:inline-block;padding:7px 14px;border-radius:9999px;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.teal{background:rgba(0,166,161,.1);color:#00A6A1;border:1px solid rgba(0,166,161,.2)}
.blue{background:rgba(0,122,255,.1);color:#007AFF;border:1px solid rgba(0,122,255,.2)}
.orange{background:rgba(255,149,0,.1);color:#FF9500;border:1px solid rgba(255,149,0,.2)}
.neutral{background:#F6F7F8;color:#55626E;box-shadow:4px 4px 8px #E7ECEF,-4px -4px 8px #fff}
</style></head><body>
<span class="b teal">Coming soon</span>
<span class="b blue">On device</span>
<span class="b orange">New</span>
<span class="b neutral">v2.1.0</span>
</body></html>
