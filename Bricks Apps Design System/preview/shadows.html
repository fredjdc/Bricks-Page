<!DOCTYPE html><html><head><meta charset="utf-8"><title>Shadows — Emboss</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;font-family:var(--bricks-font-stack);background:#F6F7F8}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.box{height:110px;border-radius:24px;background:#F6F7F8;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:#55626E}
.raised{box-shadow:var(--bricks-emboss-raised)}
.recessed{box-shadow:var(--bricks-emboss-recessed)}
.soft{box-shadow:var(--bricks-emboss-soft)}
.cap{font-size:11px;color:var(--bricks-text-secondary);font-family:var(--bricks-font-mono);text-align:center;margin-top:8px}
</style></head><body>
<div class="row">
  <div><div class="box raised">Raised</div><div class="cap">emboss-raised</div></div>
  <div><div class="box recessed">Recessed / well</div><div class="cap">emboss-recessed</div></div>
  <div><div class="box soft">Soft card</div><div class="cap">emboss-soft</div></div>
</div>
</body></html>
