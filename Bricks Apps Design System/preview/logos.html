<!DOCTYPE html><html><head><meta charset="utf-8"><title>Logos</title>
<style>
body{margin:0;padding:24px;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#F6F7F8;color:#0B0F14}
.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:center}
.cell{background:#fff;border-radius:16px;box-shadow:4px 6px 16px #E7ECEF,-2px -2px 6px #fff;padding:20px;display:flex;align-items:center;justify-content:center;height:84px}
.cell.dark{background:#0B0F14}
.cap{font-size:11px;font-family:ui-monospace,SF Mono,monospace;color:#55626E;margin-top:6px;text-align:center}
img{max-height:28px;max-width:100%}
.col{display:flex;flex-direction:column}
</style></head><body>
<div class="row">
  <div class="col"><div class="cell"><img src="../assets/bricks-dark-logo.svg"></div><div class="cap">bricks-dark-logo</div></div>
  <div class="col"><div class="cell dark"><img src="../assets/bricks-light-logo.svg"></div><div class="cap">bricks-light-logo</div></div>
  <div class="col"><div class="cell"><img src="../assets/leads-full-logo.svg" style="max-height:24px"></div><div class="cap">leads-full-logo</div></div>
</div>
</body></html>
