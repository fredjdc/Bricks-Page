<!DOCTYPE html><html><head><meta charset="utf-8"><title>Colors — Accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;font-family:var(--bricks-font-stack);background:var(--bricks-bg-primary);color:var(--bricks-text-primary)}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.swatch{border-radius:16px;height:110px;display:flex;flex-direction:column;justify-content:space-between;padding:14px;color:#fff;position:relative;overflow:hidden}
.swatch .product{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.85}
.swatch .name{font-size:13px;font-weight:600}
.swatch .hex{font-family:var(--bricks-font-mono);font-size:11px;opacity:.8}
</style></head><body>
<div class="row">
  <div class="swatch" style="background:#0B0F14"><div class="product">Bricks Umbrella</div><div><div class="name">Dark</div><div class="hex">#0B0F14</div></div></div>
  <div class="swatch" style="background:#00A6A1"><div class="product">Bricks Scan</div><div><div class="name">Teal</div><div class="hex">#00A6A1</div></div></div>
  <div class="swatch" style="background:#007AFF"><div class="product">Bricks Calc</div><div><div class="name">Blue</div><div class="hex">#007AFF</div></div></div>
  <div class="swatch" style="background:#FF9500"><div class="product">Bricks Leads</div><div><div class="name">Orange</div><div class="hex">#FF9500</div></div></div>
</div>
</body></html>
