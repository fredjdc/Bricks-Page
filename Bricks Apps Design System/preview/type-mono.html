<!DOCTYPE html><html><head><meta charset="utf-8"><title>Type — Mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;font-family:var(--bricks-font-stack);background:var(--bricks-bg-primary);color:var(--bricks-text-primary)}
