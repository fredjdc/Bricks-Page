// Shared hooks + small utilities

window.useReveal = function useReveal() {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
    el.querySelectorAll('.reveal').forEach(n => io.observe(n));
    return () => io.disconnect();
  }, []);
  return ref;
};

window.useCountUp = function useCountUp(target, when, durationMs = 1400) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    if (!when) return;
    let raf;
    const start = performance.now();
    const tick = (now) => {
      const t = Math.min(1, (now - start) / durationMs);
      const eased = 1 - Math.pow(1 - t, 3);
      setVal(Math.floor(eased * target));
      if (t < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [when, target]);
  return val;
};

window.fmtNum = function fmtNum(n) {
  return n.toLocaleString('en-US');
};

window.smoothScrollTo = function smoothScrollTo(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const y = el.getBoundingClientRect().top + window.scrollY - 24;
  window.scrollTo({ top: y, behavior: 'smooth' });
};

window.useScrollDirection = function useScrollDirection() {
  const [state, setState] = React.useState({ dir: 'up', atTop: true });
  React.useEffect(() => {
    let last = window.scrollY;
    const onScroll = () => {
      const y = window.scrollY;
      const dir = y > last + 4 ? 'down' : y < last - 4 ? 'up' : state.dir;
      setState({ dir, atTop: y < 40 });
      last = y;
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return state;
};

    const io = new IntersectionObserver((entries) => {

  }, []);
  const reveal = window.useReveal();

  return (
    <section ref={reveal} style={{
      padding: '120px 48px 120px', maxWidth: 1200, margin: '0 auto',

// ==== ScreenshotPhone.jsx ====
// Frameless floating phone screenshot, parallax on scroll.
// The PNG has no phone bezel — we treat the screenshot corners as the phone corners.
window.ScreenshotPhone = function ScreenshotPhone({ src, alt, accent, tilt = 0 }) {
  const ref = React.useRef(null);
  const [y, setY] = React.useState(0);

  React.useEffect(() => {
    let raf = 0;
    const onScroll = () => {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        raf = 0;
        const el = ref.current;
        if (!el) return;
        const rect = el.getBoundingClientRect();
        const vh = window.innerHeight;
        // progress: -1 (far below fold) → 0 (centered) → +1 (scrolled off top)
        const progress = (vh * 0.5 - (rect.top + rect.height * 0.5)) / vh;
        setY(Math.max(-1, Math.min(1, progress)));
      });
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    return () => {
      window.removeEventListener('scroll', onScroll);
      window.removeEventListener('resize', onScroll);
      if (raf) cancelAnimationFrame(raf);
    };
  }, []);

  // translate ~ ±40px of vertical parallax
  const translateY = -y * 40;

  return (
    <div ref={ref} style={{
      position: 'relative',
      display: 'flex', justifyContent: 'center', alignItems: 'center',
      perspective: 1800,
      minHeight: 640,
    }}>
      {/* Ambient color wash behind */}
      <div aria-hidden="true" style={{
        position: 'absolute', inset: '10% 15%',
        background: `radial-gradient(ellipse at 50% 55%, ${accent}22 0%, ${accent}10 35%, transparent 70%)`,
        filter: 'blur(40px)',
        pointerEvents: 'none',
        transform: `translateY(${translateY * 0.5}px)`,
        transition: 'transform 0.05s linear',
      }}/>
      <img
        src={src + (window.location.search || '')}
        alt={alt}
        style={{
          width: 340,
          height: 'auto',
          display: 'block',
          borderRadius: 48,
          transform: `translateY(${translateY}px) rotate(${tilt}deg)`,
          transition: 'transform 0.05s linear',
          boxShadow: `
            0 2px 4px rgba(0,0,0,0.04),
            0 12px 24px rgba(0,0,0,0.08),
            0 40px 80px rgba(0,0,0,0.12),
            0 80px 140px rgba(0,0,0,0.14)
          `,
          willChange: 'transform',
        }}
      />
    </div>
  );
};

// ==== Tweaks.jsx ====
// Tweaks panel (host-driven). The footer has visible toggles already; this
// just exposes them to the external Tweaks toolbar and persists state.
window.useTweaks = function useTweaks({ lang, setLang, theme, setTheme }) {
  React.useEffect(() => {
    const handler = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setVisible(true);
      if (d.type === '__deactivate_edit_mode') setVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const [visible, setVisible] = React.useState(false);

  if (!visible) return null;

  return (
    <div style={{
      position: 'fixed', right: 24, bottom: 24, zIndex: 200,
      background: 'var(--b-bg-elevated)', borderRadius: 24,
      boxShadow: '0 12px 40px rgba(0,0,0,0.18), var(--emboss-soft)',
      padding: 20, minWidth: 260,
      border: '1px solid var(--b-border)',
    }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--b-text-3)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 14 }}>Tweaks</div>
      <TweakRow label="Language">
        {['en','es'].map(v => (
          <button key={v} onClick={() => { setLang(v); persist({ lang: v }); }} style={tweakBtn(lang === v)}>{v.toUpperCase()}</button>
        ))}
      </TweakRow>
      <TweakRow label="Appearance">
        {[['auto','System'],['light','Light'],['dark','Dark']].map(([v,l]) => (
          <button key={v} onClick={() => { setTheme(v); persist({ theme: v }); }} style={tweakBtn(theme === v)}>{l}</button>
        ))}
      </TweakRow>
    </div>
  );
};

function persist(edits) {
  window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
}
function TweakRow({ label, children }) {
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ fontSize: 11, color: 'var(--b-text-2)', marginBottom: 6 }}>{label}</div>
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>{children}</div>
    </div>
  );
}
function tweakBtn(active) {
  return {
    padding: '6px 12px', borderRadius: 100, border: 'none', cursor: 'pointer',
    fontSize: 12, fontWeight: 600, fontFamily: 'inherit',
    background: active ? 'var(--b-text)' : 'var(--b-bg)',
    color: active ? 'var(--b-bg)' : 'var(--b-text)',
    boxShadow: active ? 'none' : 'var(--emboss-soft)',
  };
}


// ==== App.jsx ====
// App shell
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "lang": "en",
  "theme": "auto"
}/*EDITMODE-END*/;

function App() {
  const [lang, setLang] = React.useState(TWEAK_DEFAULTS.lang);
  const [theme, setTheme] = React.useState(TWEAK_DEFAULTS.theme);

  // Apply theme (auto = system)
  React.useEffect(() => {
    const mq = window.matchMedia('(prefers-color-scheme: dark)');
    const apply = () => {
      const effective = theme === 'auto' ? (mq.matches ? 'dark' : 'light') : theme;
      document.documentElement.setAttribute('data-theme', effective);
    };
    apply();
    if (theme === 'auto') {
      mq.addEventListener('change', apply);
      return () => mq.removeEventListener('change', apply);
    }
  }, [theme]);

  React.useEffect(() => {
    document.documentElement.setAttribute('lang', lang);
  }, [lang]);

  const t = window.COPY[lang];

  window.useTweaks({ lang, setLang, theme, setTheme });

  return (
    <>
      <window.Header t={t} lang={lang}/>
      <window.HeroSplit t={t} lang={lang}/>
      <window.StatsBand t={t}/>
      <window.ProductScan t={t}/>
      <window.ProductCalc t={t}/>
      <window.ProductLeads t={t}/>
      <window.PhilosophyBand t={t}/>
      <window.Testimonials t={t}/>
      <window.Changelog t={t}/>
      <window.DownloadCTA t={t}/>
      <window.Footer t={t} lang={lang} setLang={setLang} theme={theme} setTheme={setTheme}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);


</script>
