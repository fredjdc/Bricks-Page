        window.useReveal = function useReveal() {
            const ref = React.useRef(null);
            React.useEffect(() => {
                const el = ref.current;
                if (!el) return;
                const io = new IntersectionObserver((entries) => {
                    entries.forEach(e => {
                        if (e.isIntersecting) {
                            e.target.classList.add('in');
                            io.unobserve(e.target);
                        }
                    });
                }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
                el.querySelectorAll('.reveal').forEach(n => io.observe(n));
                return () => io.disconnect();
            }, []);
            return ref;
        };

        window.smoothScrollTo = function smoothScrollTo(id) {
            const el = document.getElementById(id);
            if (!el) return;
            const y = el.getBoundingClientRect().top + window.scrollY - 24;
            window.scrollTo({ top: y, behavior: 'smooth' });
        };

        window.useScrollDirection = function useScrollDirection() {
            const [state, setState] = React.useState({ dir: 'up', atTop: true });
            React.useEffect(() => {
                let last = window.scrollY;
                const onScroll = () => {
                    const y = window.scrollY;
                    const dir = y > last + 4 ? 'down' : y < last - 4 ? 'up' : state.dir;
                    setState({ dir, atTop: y < 40 });
                    last = y;
                };
                window.addEventListener('scroll', onScroll, { passive: true });
                return () => window.removeEventListener('scroll', onScroll);
            }, []);
            return state;
        };

        window.useIsMobile = function useIsMobile(breakpoint = 768) {
            const [isMobile, setIsMobile] = React.useState(() => window.innerWidth <= breakpoint);
            React.useEffect(() => {
                const mq = window.matchMedia(`(max-width: ${breakpoint}px)`);
                setIsMobile(mq.matches);
                const handler = (e) => setIsMobile(e.matches);
                mq.addEventListener('change', handler);
                return () => mq.removeEventListener('change', handler);
            }, [breakpoint]);
            return isMobile;
        };

        window.useTheme = function useTheme() {
            const [theme, setTheme] = React.useState(
                () => document.documentElement.getAttribute('data-theme') || 'light'
            );
            React.useEffect(() => {
                const observer = new MutationObserver(() => {
                    setTheme(document.documentElement.getAttribute('data-theme') || 'light');
                });
                observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
                return () => observer.disconnect();
            }, []);
            return theme;
        };

        window.useTweaks = function useTweaks({ lang, setLang, theme, setTheme }) {
            const [visible, setVisible] = React.useState(false);

            React.useEffect(() => {
                const handler = (e) => {
                    const d = e.data || {};
                    if (d.type === '__activate_edit_mode') setVisible(true);
                    if (d.type === '__deactivate_edit_mode') setVisible(false);
                };
                window.addEventListener('message', handler);
                window.parent.postMessage({ type: '__edit_mode_available' }, '*');
                return () => window.removeEventListener('message', handler);
            }, []);

            if (!visible) return null;

            return (
                <div style={{
                    position: 'fixed', right: 24, bottom: 24, zIndex: 200,
                    background: 'var(--b-bg-elevated)', borderRadius: 24,
                    boxShadow: '0 12px 40px rgba(0,0,0,0.18), var(--emboss-soft)',
                    padding: 20, minWidth: 260,
                    border: '1px solid var(--b-border)',
                }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--b-text-3)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 14 }}>Tweaks</div>
                    <TweakRow label="Language">
                        {['en', 'es'].map(v => (
                            <button key={v} onClick={() => { setLang(v); tweakPersist({ lang: v }); }} style={tweakBtn(lang === v)}>{v.toUpperCase()}</button>
                        ))}
                    </TweakRow>
                    <TweakRow label="Appearance">
                        {[['auto', 'System'], ['light', 'Light'], ['dark', 'Dark']].map(([v, l]) => (
                            <button key={v} onClick={() => { setTheme(v); tweakPersist({ theme: v }); }} style={tweakBtn(theme === v)}>{l}</button>
                        ))}
                    </TweakRow>
                </div>
            );
        };

        function tweakPersist(edits) {
            window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
        }
        function TweakRow({ label, children }) {
            return (
                <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 11, color: 'var(--b-text-2)', marginBottom: 6 }}>{label}</div>
                    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>{children}</div>
                </div>
            );
        }
        function tweakBtn(active) {
            return {
                padding: '6px 12px', borderRadius: 100, border: 'none', cursor: 'pointer',
                fontSize: 12, fontWeight: 600, fontFamily: 'inherit',
                background: active ? 'var(--b-text)' : 'var(--b-bg)',
                color: active ? 'var(--b-bg)' : 'var(--b-text)',
                boxShadow: active ? 'none' : 'var(--emboss-soft)',

        // ==========================================================================
        // Accordion component
        // ==========================================================================

        function Accordion({ title, defaultOpen = false, children, delay = 0 }) {
            const [open, setOpen] = React.useState(defaultOpen);
            const isMobile = window.useIsMobile();

            return (
                <div style={{
                    background: 'var(--b-bg-elevated)',
                    borderRadius: isMobile ? 28 : 32,
                    boxShadow: 'var(--emboss-soft)',
                    border: '1px solid var(--b-border)',
                    marginBottom: 16,
                    overflow: 'hidden',
                    transition: 'box-shadow 0.4s ease, transform 0.4s ease',
                }}>
                    <button
                        onClick={() => setOpen(v => !v)}
                        style={{
                            width: '100%', display: 'flex', alignItems: 'center',
                            justifyContent: 'space-between', gap: 16,
                            padding: isMobile ? '20px 24px' : '24px 32px',
                            textAlign: 'left', background: 'none', border: 'none',
                            cursor: 'pointer', fontFamily: 'inherit',
                            borderBottom: open ? '1px solid var(--b-border)' : '1px solid transparent',
                            transition: 'border-color 0.3s ease',
                        }}
                    >
                        <span style={{
                            fontSize: isMobile ? 18 : 20, fontWeight: 700,
                            letterSpacing: '-0.01em', color: 'var(--b-text)',
                        }}>{title}</span>
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
                            style={{
                                flexShrink: 0, color: 'var(--b-text-3)',
                                transform: open ? 'rotate(180deg)' : 'rotate(0)',
                                transition: 'transform 0.3s cubic-bezier(0.16,1,0.3,1)',
                            }}
                        >
                            <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
                        </svg>
                    </button>

                    <div style={{
                        maxHeight: open ? 5000 : 0,
                        opacity: open ? 1 : 0,
                        overflow: 'hidden',
                        transition: 'max-height 0.5s cubic-bezier(0.16,1,0.3,1), opacity 0.35s ease',
                    }}>
                        <div style={{ padding: isMobile ? '24px 24px 28px' : '32px 32px 36px' }}>
                            {children}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================================================
        // ContentGroup — renders a heading + items
        // ==========================================================================

        function ContentGroup({ heading, intro, items }) {
            const isMobile = window.useIsMobile();
            return (
                <div style={{ marginBottom: 28 }}>
                    <h3 style={{
                        fontSize: isMobile ? 16 : 17, fontWeight: 700,
                        letterSpacing: '-0.01em', color: 'var(--b-text)',
                        margin: '0 0 12px',
                    }}>{heading}</h3>
                    {intro && (
                        <p style={{ fontSize: 15, lineHeight: 1.6, color: 'var(--b-text-2)', margin: '0 0 14px' }}>
                            {intro}
                        </p>
                    )}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                        {items.map((item, i) => (
                            <div key={i} style={{
                                padding: isMobile ? '16px 18px' : '18px 22px',
                                background: 'var(--b-bg)',
                                borderRadius: isMobile ? 18 : 22,
                                boxShadow: 'var(--emboss-recessed)',
                            }}>
                                <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--b-text)', marginBottom: 4 }}>
                                    {item.t}
                                </div>
                                <p style={{ fontSize: 14, lineHeight: 1.55, color: 'var(--b-text-2)', margin: 0 }}>
                                    {item.d}
                                </p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ==========================================================================

            const isMobile = window.useIsMobile();

                <div style={{ marginTop: 4 }}>

                    <ul style={{
                        paddingLeft: 20, margin: 0,

                    </ul>

        }

        // ==========================================================================
        // SectionContent — renders a full accordion section
        // ==========================================================================

        function SectionContent({ data, tipsLabel }) {
            return (
                <React.Fragment>
                    {data.intro && (
                        <p style={{ fontSize: 15, lineHeight: 1.6, color: 'var(--b-text-2)', margin: '0 0 24px' }}>
                            {data.intro}
                        </p>
                    )}
                    {data.groups && data.groups.map((g, i) => (
                        <ContentGroup key={i} heading={g.heading} intro={g.intro} items={g.items} />
                    ))}
                    {/* Results page extras: amortization + actions */}
                    {data.amortizationTitle && (
                        <div style={{ marginBottom: 28 }}>
                            <h3 style={{ fontSize: 17, fontWeight: 700, letterSpacing: '-0.01em', color: 'var(--b-text)', margin: '0 0 12px' }}>
                                {data.amortizationTitle}
                            </h3>
                            <p style={{ fontSize: 14, lineHeight: 1.6, color: 'var(--b-text-2)', margin: 0 }}>
                                {data.amortization}
                            </p>
                        </div>
                    )}
                    {data.actions && (
                        <ContentGroup heading={data.actionsTitle} items={data.actions} />
                    )}
                    {data.tips && <TipsList tips={data.tips} label={tipsLabel} />}
                </React.Fragment>
            );
        }

        // HelpContent
        // ==========================================================================

        function HelpContent({ t }) {
            const reveal = window.useReveal();
            const isMobile = window.useIsMobile();
            const s = t.sections;
            const tipsLabel = t === HELP_COPY.es ? 'Consejos' : 'Tips';

            const calcSections = ['simulator', 'results', 'prepayment', 'expenses', 'files'];
            const scanSections = ['scan', 'documents', 'organize', 'annotate', 'exportShare'];

            return (
                <section ref={reveal} style={{
                    padding: isMobile ? '0 20px 64px' : '0 48px 120px',
                    maxWidth: 800, margin: '0 auto',
                }}>
                    {/* Bricks Calc */}
                    <div className="reveal">
                        <ProductDivider label={t.calcLabel} accent={window.ACCENTS.calc.light} />
                    </div>
                    {calcSections.map((key, i) => (
                        <div key={key} className="reveal" style={{ transitionDelay: `${0.05 * (i + 1)}s` }}>
                            <Accordion title={s[key].title}>
                                <SectionContent data={s[key]} tipsLabel={tipsLabel} />
                            </Accordion>
                        </div>
                    ))}

                    {/* Bricks Scan */}
                    <div className="reveal">
                        <ProductDivider label={t.scanLabel} accent={window.ACCENTS.scan.light} />
                    </div>
                    {scanSections.map((key, i) => (
                        <div key={key} className="reveal" style={{ transitionDelay: `${0.05 * (i + 1)}s` }}>
                            <Accordion title={s[key].title}>
                                <SectionContent data={s[key]} tipsLabel={tipsLabel} />
                            </Accordion>
                        </div>
                    ))}
                </section>
            );
        }

        // ==========================================================================
        // App
        // ==========================================================================

        const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"lang": "en", "theme": "auto"}/*EDITMODE-END*/;

        function App() {
            const [lang, setLang] = React.useState(TWEAK_DEFAULTS.lang);
            const [theme, setTheme] = React.useState(TWEAK_DEFAULTS.theme);

            React.useEffect(() => {
                const mq = window.matchMedia('(prefers-color-scheme: dark)');
                const apply = () => {
                    const effective = theme === 'auto' ? (mq.matches ? 'dark' : 'light') : theme;
                    document.documentElement.setAttribute('data-theme', effective);
                };
                apply();
                if (theme === 'auto') {
                    mq.addEventListener('change', apply);
                    return () => mq.removeEventListener('change', apply);
                }
            }, [theme]);

            React.useEffect(() => {
                document.documentElement.setAttribute('lang', lang);
            }, [lang]);

            const t = window.COPY[lang] || window.COPY.en;
            const helpT = HELP_COPY[lang] || HELP_COPY.en;

            return (
                <div style={{ background: 'var(--b-bg)', minHeight: '100vh', overflow: 'hidden' }}>
                    <window.Header t={t} lang={lang} currentProduct="help" />

                    <main>
                        <HelpHero t={helpT} />
                        <HelpContent t={helpT} />
                        <window.DownloadCTA t={t} />
                    </main>

                    <window.Footer t={t} lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />

                    {/* Tweaks Menu (hidden until activated) */}
                    <window.useTweaks lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
