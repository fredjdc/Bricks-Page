    window.useReveal = function useReveal() {
      const ref = React.useRef(null);
      React.useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('in');
              io.unobserve(e.target);
            }
          });
        }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
        el.querySelectorAll('.reveal').forEach(n => io.observe(n));
        return () => io.disconnect();
      }, []);
      return ref;
    };

    window.useCountUp = function useCountUp(target, when, durationMs = 1400) {
      const [val, setVal] = React.useState(0);
      React.useEffect(() => {
        if (!when) return;
        let raf;
        const start = performance.now();
        const tick = (now) => {
          const t = Math.min(1, (now - start) / durationMs);
          const eased = 1 - Math.pow(1 - t, 3);
          setVal(Math.floor(eased * target));
          if (t < 1) raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, [when, target]);
      return val;
    };

    window.smoothScrollTo = function smoothScrollTo(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const y = el.getBoundingClientRect().top + window.scrollY - 24;
      window.scrollTo({ top: y, behavior: 'smooth' });

    window.useScrollDirection = function useScrollDirection() {
      const [state, setState] = React.useState({ dir: 'up', atTop: true });
      React.useEffect(() => {
        let last = window.scrollY;
        const onScroll = () => {
          const y = window.scrollY;
          const dir = y > last + 4 ? 'down' : y < last - 4 ? 'up' : state.dir;
          setState({ dir, atTop: y < 40 });
          last = y;
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      return state;
    };

    window.useIsMobile = function useIsMobile(breakpoint = 768) {
      const [isMobile, setIsMobile] = React.useState(() => window.innerWidth <= breakpoint);
      React.useEffect(() => {
        const mq = window.matchMedia(`(max-width: ${breakpoint}px)`);
        setIsMobile(mq.matches);
        const handler = (e) => setIsMobile(e.matches);
        mq.addEventListener('change', handler);
        return () => mq.removeEventListener('change', handler);
      }, [breakpoint]);
      return isMobile;
    };

        });
        observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
        return () => observer.disconnect();
      }, []);
      return theme;
    };

    // ==========================================================================

    window.ScreenshotPhone = function ScreenshotPhone({ src, alt, accent, tilt = 0 }) {
      const ref = React.useRef(null);
      const [y, setY] = React.useState(0);
      const isMobile = window.useIsMobile();

      React.useEffect(() => {
        let raf = 0;
        const onScroll = () => {
          if (raf) return;
          raf = requestAnimationFrame(() => {
            raf = 0;
            const el = ref.current;
            if (!el) return;
            const rect = el.getBoundingClientRect();
            const vh = window.innerHeight;
            const progress = (vh * 0.5 - (rect.top + rect.height * 0.5)) / vh;
            setY(Math.max(-1, Math.min(1, progress)));
          });
        };
        onScroll();
        window.addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('resize', onScroll);
        return () => {
          window.removeEventListener('scroll', onScroll);
          window.removeEventListener('resize', onScroll);
          if (raf) cancelAnimationFrame(raf);
        };
      }, []);

      const translateY = -y * 40;

      return (
        <div ref={ref} style={{
          position: 'relative',
          display: 'flex', justifyContent: 'center', alignItems: 'center',
          perspective: 1800,
          minHeight: isMobile ? 360 : 640,
        }}>
          <div aria-hidden="true" style={{
            position: 'absolute', inset: '10% 15%',
            background: `radial-gradient(ellipse at 50% 55%, ${accent}22 0%, ${accent}10 35%, transparent 70%)`,
            filter: 'blur(40px)',
            pointerEvents: 'none',
            transform: `translateY(${translateY * 0.5}px)`,
            transition: 'transform 0.05s linear',
          }} />

            alt={alt}

              height: 'auto',

              transform: `translateY(${translateY}px) rotate(${tilt}deg)`,
              transition: 'transform 0.05s linear',
              boxShadow: '0 2px 4px rgba(0,0,0,0.04), 0 12px 24px rgba(0,0,0,0.08), 0 40px 80px rgba(0,0,0,0.12), 0 80px 140px rgba(0,0,0,0.14)',

            }}

    };

    window.useTweaks = function useTweaks({ lang, setLang, theme, setTheme }) {
      const [visible, setVisible] = React.useState(false);

      React.useEffect(() => {
        const handler = (e) => {
          const d = e.data || {};
          if (d.type === '__activate_edit_mode') setVisible(true);
          if (d.type === '__deactivate_edit_mode') setVisible(false);
        };
        window.addEventListener('message', handler);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', handler);
      }, []);

      if (!visible) return null;

      return (
        <div style={{
          position: 'fixed', right: 24, bottom: 24, zIndex: 200,
          background: 'var(--b-bg-elevated)', borderRadius: 24,
          boxShadow: '0 12px 40px rgba(0,0,0,0.18), var(--emboss-soft)',
          padding: 20, minWidth: 260,
          border: '1px solid var(--b-border)',
        }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--b-text-3)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 14 }}>Tweaks</div>
          <TweakRow label="Language">
            {['en', 'es'].map(v => (
              <button key={v} onClick={() => { setLang(v); tweakPersist({ lang: v }); }} style={tweakBtn(lang === v)}>{v.toUpperCase()}</button>
            ))}
          </TweakRow>
          <TweakRow label="Appearance">
            {[['auto', 'System'], ['light', 'Light'], ['dark', 'Dark']].map(([v, l]) => (
              <button key={v} onClick={() => { setTheme(v); tweakPersist({ theme: v }); }} style={tweakBtn(theme === v)}>{l}</button>
            ))}
          </TweakRow>
        </div>
      );
    };

    function tweakPersist(edits) {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    }
    function TweakRow({ label, children }) {
      return (
        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 11, color: 'var(--b-text-2)', marginBottom: 6 }}>{label}</div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>{children}</div>
        </div>
      );
    }
    function tweakBtn(active) {
      return {
        padding: '6px 12px', borderRadius: 100, border: 'none', cursor: 'pointer',
        fontSize: 12, fontWeight: 600, fontFamily: 'inherit',
        background: active ? 'var(--b-text)' : 'var(--b-bg)',
        color: active ? 'var(--b-bg)' : 'var(--b-text)',
        boxShadow: active ? 'none' : 'var(--emboss-soft)',
      };
    }

    // ==========================================================================

    // ==========================================================================

    function LeadsStats({ t }) {
      const reveal = window.useReveal();
      const isMobile = window.useIsMobile();
      const [visible, setVisible] = React.useState(false);
      const bandRef = React.useRef(null);

      React.useEffect(() => {
        const el = bandRef.current;
        if (!el) return;
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) { setVisible(true); io.unobserve(e.target); } });
        }, { threshold: 0.3 });
        io.observe(el);
        return () => io.disconnect();
      }, []);

      return (
        <section ref={reveal} style={{
          padding: isMobile ? '40px 20px' : '80px 48px',
          maxWidth: 1200, margin: '0 auto',
        }}>
          <div className="reveal" style={{ textAlign: 'center', marginBottom: isMobile ? 32 : 48 }}>

            <p style={{ fontSize: 16, color: 'var(--b-text-2)', margin: 0 }}>{t.stats.sub}</p>
          </div>

          <div ref={bandRef} className="reveal reveal-d1" style={{
            display: 'grid',
            gridTemplateColumns: isMobile ? '1fr' : 'repeat(3, 1fr)',
            gap: isMobile ? 16 : 24,

            borderRadius: isMobile ? 32 : 48,
            padding: isMobile ? '28px 24px' : '48px 32px',
            boxShadow: 'var(--emboss-soft)',

                    )}
                  </div>
                  <div style={{ fontSize: 15, color: 'var(--b-text-2)', lineHeight: 1.5 }}>{it.tagline}</div>
                </a>
              );
            })}
          </div>
        </section>
      );
    }


    // ==========================================================================
    // App
    // ==========================================================================

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "lang": "en",
      "theme": "auto"
    }/*EDITMODE-END*/;

    function App() {
      const [lang, setLang] = React.useState(TWEAK_DEFAULTS.lang);
      const [theme, setTheme] = React.useState(TWEAK_DEFAULTS.theme);

      React.useEffect(() => {
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        const apply = () => {
          const effective = theme === 'auto' ? (mq.matches ? 'dark' : 'light') : theme;
          document.documentElement.setAttribute('data-theme', effective);
        };
        apply();
        if (theme === 'auto') {
          mq.addEventListener('change', apply);
          return () => mq.removeEventListener('change', apply);
        }
      }, [theme]);

      React.useEffect(() => {
        document.documentElement.setAttribute('lang', lang);
      }, [lang]);

      const effectiveTheme = window.useTheme();
      const shared = window.COPY[lang];
      const leads = LEADS_COPY[lang];
      const shot1 = `images-bricks-leads/screenshot-capture-section-${lang}-light.png`;
      const shot2 = `images-bricks-leads/screenshot-followup-section-${lang}-light.png`;

      window.useTweaks({ lang, setLang, theme, setTheme });

      return (
        <>
          <window.Header
            t={shared}
            lang={lang}
            currentProduct="leads"
            cta={{ label: lang === 'es' ? '\u00danete al beta' : 'Join the beta', href: '#join-beta' }}
          />
          <LeadsHero t={leads} lang={lang} theme={effectiveTheme} />
          <LeadsStats t={leads} />
          <LeadsPillars t={leads} theme={effectiveTheme} />
          <LeadsFeatureSplit t={leads} lang={lang} theme={effectiveTheme} feature={leads.feature1} reverse={false} shotSrc={shot1} />
          <LeadsFeatureSplit t={leads} lang={lang} theme={effectiveTheme} feature={leads.feature2} reverse={true} shotSrc={shot2} />
          <LeadsFeatureSplit t={leads} lang={lang} theme={effectiveTheme} feature={leads.feature3} reverse={false} shotSrc={`images-bricks-leads/hero-video-img-${lang}.png`} />
          <LeadsTestimonials t={leads} />
          <window.DownloadCTA
            t={shared}
            variant="beta"
            betaCopy={leads.beta_cta}
            accent={LEADS_ACCENT}
          />
          <LeadsFAQ t={leads} />
          <LeadsEcosystem t={leads} />
          <window.Footer t={shared} lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>

</html>
