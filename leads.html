window.useReveal = function useReveal() {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
    el.querySelectorAll('.reveal').forEach(n => io.observe(n));
    return () => io.disconnect();
  }, []);
  return ref;
};

window.useCountUp = function useCountUp(target, when, durationMs = 1400) {
  const [val, setVal] = React.useState(0);
  React.useEffect(() => {
    if (!when) return;
    let raf;
    const start = performance.now();
    const tick = (now) => {
      const t = Math.min(1, (now - start) / durationMs);
      const eased = 1 - Math.pow(1 - t, 3);
      setVal(Math.floor(eased * target));
      if (t < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [when, target]);
  return val;
};

window.fmtNum = function fmtNum(n) {

window.smoothScrollTo = function smoothScrollTo(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const y = el.getBoundingClientRect().top + window.scrollY - 24;
  window.scrollTo({ top: y, behavior: 'smooth' });
};

window.useScrollDirection = function useScrollDirection() {
  const [state, setState] = React.useState({ dir: 'up', atTop: true });
  React.useEffect(() => {
    let last = window.scrollY;
    const onScroll = () => {
      const y = window.scrollY;
      const dir = y > last + 4 ? 'down' : y < last - 4 ? 'up' : state.dir;
      setState({ dir, atTop: y < 40 });
      last = y;
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return state;
};

window.useIsMobile = function useIsMobile(breakpoint = 768) {
  const [isMobile, setIsMobile] = React.useState(() => window.innerWidth <= breakpoint);
  React.useEffect(() => {
    const mq = window.matchMedia(`(max-width: ${breakpoint}px)`);
    setIsMobile(mq.matches);
    const handler = (e) => setIsMobile(e.matches);
    mq.addEventListener('change', handler);
    return () => mq.removeEventListener('change', handler);
  }, [breakpoint]);
  return isMobile;
};

window.useTheme = function useTheme() {
  const [theme, setTheme] = React.useState(
    () => document.documentElement.getAttribute('data-theme') || 'light'
  );
  React.useEffect(() => {
    const observer = new MutationObserver(() => {
      setTheme(document.documentElement.getAttribute('data-theme') || 'light');
    });
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
    return () => observer.disconnect();
  }, []);
  return theme;
};

window.ScreenshotPhone = function ScreenshotPhone({ src, alt, accent, tilt = 0 }) {
  const ref = React.useRef(null);
  const [y, setY] = React.useState(0);
  const isMobile = window.useIsMobile();

  React.useEffect(() => {
    let raf = 0;
    const onScroll = () => {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        raf = 0;
        const el = ref.current;
        if (!el) return;
        const rect = el.getBoundingClientRect();
        const vh = window.innerHeight;
        const progress = (vh * 0.5 - (rect.top + rect.height * 0.5)) / vh;
        setY(Math.max(-1, Math.min(1, progress)));
      });
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll);
    return () => {
      window.removeEventListener('scroll', onScroll);
      window.removeEventListener('resize', onScroll);
      if (raf) cancelAnimationFrame(raf);
    };
  }, []);

  const translateY = -y * 40;

  return (
    <div ref={ref} style={{
      position: 'relative',
      display: 'flex', justifyContent: 'center', alignItems: 'center',
      perspective: 1800,
      minHeight: isMobile ? 360 : 640,
    }}>
      <div aria-hidden="true" style={{
        position: 'absolute', inset: '10% 15%',
        background: `radial-gradient(ellipse at 50% 55%, ${accent}22 0%, ${accent}10 35%, transparent 70%)`,
        filter: 'blur(40px)',
        pointerEvents: 'none',
        transform: `translateY(${translateY * 0.5}px)`,
        transition: 'transform 0.05s linear',
      }}/>
      <img
        src={src + (window.location.search || '')}
        alt={alt}
        style={{
          width: isMobile ? '100%' : 340,
          maxWidth: isMobile ? 280 : 'none',
          height: 'auto',
          display: 'block',
          borderRadius: 48,
          transform: `translateY(${translateY}px) rotate(${tilt}deg)`,
          transition: 'transform 0.05s linear',
          boxShadow: `
            0 2px 4px rgba(0,0,0,0.04),
            0 12px 24px rgba(0,0,0,0.08),
            0 40px 80px rgba(0,0,0,0.12),
            0 80px 140px rgba(0,0,0,0.14)
          `,
          willChange: 'transform',
        }}
      />
    </div>
  );
};

    function App() {
      // Default to system language, falling back to 'es'
      const systemLang = (typeof navigator !== 'undefined' && navigator.language.startsWith('en')) ? 'en' : 'es';
      const [lang, setLang] = React.useState(systemLang);
      const [theme, setTheme] = React.useState('auto');

      // Add a fallback in case window.COPY isn't populated immediately
      const copyReady = window.COPY && window.COPY[lang];
      const [, forceRender] = React.useState(0);

      React.useEffect(() => {
        if (!copyReady) {
          const t = setTimeout(() => forceRender(x => x + 1), 50);
          return () => clearTimeout(t);
        }
      }, [copyReady]);

      React.useEffect(() => {
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        const apply = () => {
          const effective = theme === 'auto' ? (mq.matches ? 'dark' : 'light') : theme;
          document.documentElement.setAttribute('data-theme', effective);
        };
        apply();
        if (theme === 'auto') {
          mq.addEventListener('change', apply);
          return () => mq.removeEventListener('change', apply);
        }
      }, [theme]);

      React.useEffect(() => {
        document.documentElement.setAttribute('lang', lang);
      }, [lang]);

      if (!copyReady) return null;

      const t = window.COPY[lang];
      const tLeads = LEADS_COPY[lang];

      return (
        <React.Fragment>
          <window.Header t={t} lang={lang} currentProduct="leads"/>
          <LeadsHero t={t} tLeads={tLeads} lang={lang} />
          <WhyLeads tLeads={tLeads} />
          <LeadsFeatures tLeads={tLeads} />
          <window.DownloadCTA t={t} />
          <LeadsFAQ tLeads={tLeads} />
          <Ecosystem t={t} tLeads={tLeads} lang={lang} />
          <window.Footer t={t} lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />
        </React.Fragment>
      );
    }

    // Since we're using Babel standalone, scripts are executed synchronously if loaded properly,
    // so `window.Header` and others are defined. Let's render.
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
