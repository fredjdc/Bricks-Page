    // ==========================================================================
    // BetaForm — inline name + email, posts to FormSubmit.co
    // ==========================================================================

    function BetaForm({ t }) {
      const [submitting, setSubmitting] = React.useState(false);
      const [focus, setFocus] = React.useState(null);
      const isMobile = window.useIsMobile();
      const f = t.hero.form;

      const onSubmit = () => {
        setSubmitting(true);
        try {
          if (typeof gtag === 'function') {
            gtag('event', 'beta_signup', {
              event_category: 'engagement',
              event_label: 'bricks_leads',
            });
          }
        } catch (e) { }
      };

      const fieldStyle = (id) => ({
        width: '100%', padding: '14px 18px',
        borderRadius: 16, border: '1px solid var(--b-border)',
        background: 'var(--b-bg-elevated)',
        color: 'var(--b-text)',
        fontSize: 15, fontFamily: 'inherit',
        boxShadow: focus === id
          ? `var(--emboss-recessed), 0 0 0 3px ${LEADS_ACCENT}22`
          : 'var(--emboss-soft)',
        outline: 'none',
        transition: 'box-shadow 0.2s ease',
      });

      return (
        <form
          id="join-beta"
          action="https://formsubmit.co/707e6e012fa931048784ff0f766aa0df"
          method="POST"
          onSubmit={onSubmit}
          className="reveal reveal-d3"
          style={{
            display: 'flex', flexDirection: 'column', gap: 12,
            maxWidth: 460, scrollMarginTop: 120,
          }}
        >
          <input type="hidden" name="_subject" value="Bricks Leads Beta Tester" />
          <input type="hidden" name="_template" value="table" />
          <input type="hidden" name="_captcha" value="false" />
          <input type="hidden" name="_next" value="https://bricks.pe/thank-you.html" />
          <input type="text" name="_honey" style={{ display: 'none' }} tabIndex="-1" autoComplete="off" />

          <div style={{ display: 'flex', flexDirection: isMobile ? 'column' : 'row', gap: 12 }}>
            <input
              type="text" name="name" required
              placeholder={f.name}
              onFocus={() => setFocus('name')}
              onBlur={() => setFocus(null)}
              style={fieldStyle('name')}
            />
            <input
              type="email" name="email" required
              placeholder={f.email}
              onFocus={() => setFocus('email')}
              onBlur={() => setFocus(null)}
              style={fieldStyle('email')}
            />
          </div>

          <button
            type="submit"
            disabled={submitting}
            style={{
              marginTop: 4, padding: '14px 22px',
              background: LEADS_ACCENT, color: '#fff',
              border: 'none', borderRadius: 100,
              fontSize: 15, fontWeight: 600, letterSpacing: '-0.01em',
              fontFamily: 'inherit', cursor: submitting ? 'wait' : 'pointer',
              boxShadow: `0 12px 28px ${LEADS_ACCENT}40`,
              transition: 'transform 0.15s ease, box-shadow 0.2s ease',
              opacity: submitting ? 0.8 : 1,
            }}
            onMouseEnter={(e) => { if (!submitting) e.currentTarget.style.transform = 'translateY(-1px)'; }}
            onMouseLeave={(e) => { e.currentTarget.style.transform = 'translateY(0)'; }}
          >
            {submitting ? f.submitting : f.submit}
          </button>

          <div style={{ fontSize: 13, color: 'var(--b-text-3)', lineHeight: 1.55, marginTop: 6 }}>
            {f.iosNote}
          </div>
          <div style={{ fontSize: 12, color: 'var(--b-text-3)', lineHeight: 1.55 }}>
            {f.privacyNote}{' '}
            <a href="privacy.html" style={{ color: LEADS_ACCENT, textDecoration: 'underline', textUnderlineOffset: 2 }}>
              {f.privacyLink}
            </a>
          </div>
        </form>
      );

    // ==========================================================================
    // LeadsStats — count-up band
    // ==========================================================================

    function LeadsStats({ t }) {
      const reveal = window.useReveal();
      const isMobile = window.useIsMobile();
      const [visible, setVisible] = React.useState(false);
      const bandRef = React.useRef(null);

      React.useEffect(() => {
        const el = bandRef.current;
        if (!el) return;
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) { setVisible(true); io.unobserve(e.target); } });
        }, { threshold: 0.3 });
        io.observe(el);
        return () => io.disconnect();
      }, []);

      return (
        <section ref={reveal} style={{
          padding: isMobile ? '40px 20px' : '80px 48px',
          maxWidth: 1200, margin: '0 auto',
        }}>
          <div className="reveal" style={{ textAlign: 'center', marginBottom: isMobile ? 32 : 48 }}>
            <div style={{ ...window.eyebrowStyle, color: LEADS_ACCENT }}>{t.stats.eyebrow}</div>
            <h2 style={{
              fontSize: isMobile ? 32 : 44, fontWeight: 900, letterSpacing: '-0.035em',
              lineHeight: 1.05, margin: '0 0 12px', color: 'var(--b-text)',
            }}>{t.stats.title}</h2>
            <p style={{ fontSize: 16, color: 'var(--b-text-2)', margin: 0 }}>{t.stats.sub}</p>
          </div>

          <div ref={bandRef} className="reveal reveal-d1" style={{
            display: 'grid',
            gridTemplateColumns: isMobile ? '1fr' : 'repeat(3, 1fr)',
            gap: isMobile ? 16 : 24,
            background: 'var(--b-bg-elevated)',
            borderRadius: isMobile ? 32 : 48,
            padding: isMobile ? '28px 24px' : '48px 32px',
            boxShadow: 'var(--emboss-soft)',
          }}>
            {t.stats.items.map((item, i) => (
              <StatCell key={i} item={item} visible={visible} />
            ))}
          </div>
        </section>
      );
    }

    function StatCell({ item, visible }) {
      const v = window.useCountUp(item.v, visible);
      return (
        <div style={{ textAlign: 'center', padding: '12px 8px' }}>
          <div style={{
            fontSize: 48, fontWeight: 900, letterSpacing: '-0.035em',
            color: LEADS_ACCENT, lineHeight: 1,
          }}>
            {window.fmtNum(v)}{item.suffix === '+' ? '+' : item.suffix === '%' ? '' : item.suffix}
          </div>
          <div style={{ marginTop: 10, fontSize: 14, color: 'var(--b-text-2)' }}>{item.l}</div>
        </div>
      );
    }

          </div>

          <div style={{
            display: 'grid',
            gridTemplateColumns: isMobile ? '1fr' : 'repeat(3, 1fr)',
            gap: isMobile ? 16 : 24,
          }}>
            {t.pillars.items.map((p, i) => (
              <div key={i} className={`reveal reveal-d${i + 1}`} style={{
                background: 'var(--b-bg-elevated)', borderRadius: 32,
                padding: isMobile ? 28 : 36,
                boxShadow: 'var(--emboss-soft)',
                border: '1px solid var(--b-border)',
              }}>
                <div style={{
                  width: 36, height: 36, borderRadius: 12,
                  background: `${LEADS_ACCENT}1a`,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  marginBottom: 20,
                }}>
                  <div style={{ width: 10, height: 10, borderRadius: 5, background: LEADS_ACCENT }} />
                </div>
                <div style={{ fontSize: 20, fontWeight: 700, color: 'var(--b-text)', marginBottom: 8, letterSpacing: '-0.01em' }}>{p.t}</div>
                <div style={{ fontSize: 15, color: 'var(--b-text-2)', lineHeight: 1.55 }}>{p.d}</div>
              </div>
            ))}
          </div>
        </section>
      );
    }


    // ==========================================================================
    // LeadsFeatureSplit — alternating text + screenshot rows
    // ==========================================================================

    function LeadsFeatureSplit({ t, lang, theme, feature, reverse, shotSrc }) {
      const reveal = window.useReveal();
      const isMobile = window.useIsMobile();
      return (
        <section ref={reveal} style={{
          padding: isMobile ? '56px 20px' : '96px 48px',
          maxWidth: 1280, margin: '0 auto',
        }}>
          <div style={{
            display: 'grid',
            gridTemplateColumns: isMobile ? '1fr' : '1fr 1fr',
            gap: isMobile ? 40 : 96,
            alignItems: 'center',
            direction: reverse && !isMobile ? 'rtl' : 'ltr',
          }}>
            <div className="reveal" style={{ direction: 'ltr' }}>
              <div style={{ ...window.eyebrowStyle, color: LEADS_ACCENT }}>{feature.eyebrow}</div>
              <h2 style={{
                fontSize: isMobile ? 36 : 52, fontWeight: 900, letterSpacing: '-0.035em',
                lineHeight: 1.02, margin: '0 0 20px', color: 'var(--b-text)',
              }}>
                {feature.title[0]}<br />
                <span style={{ color: 'var(--b-text-2)' }}>{feature.title[1]}</span>
              </h2>
              <p style={{ ...window.leadP, marginBottom: 28 }}>{feature.body}</p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
                {feature.bullets.map((b, i) => (
                  <window.Bullet key={i} accent={LEADS_ACCENT} t={b.t} d={b.d} />
                ))}
              </div>
            </div>
            <div className="reveal reveal-d1" style={{ direction: 'ltr' }}>
              <window.ScreenshotPhone src={shotSrc} alt={feature.title.join(' ')} accent={LEADS_ACCENT} tilt={reverse ? 1.5 : -1.5} />
            </div>
          </div>
        </section>
      );
    }


    // ==========================================================================
    // LeadsTestimonials — three quotes, soft-emboss cards
    // ==========================================================================

    function LeadsTestimonials({ t }) {
      const reveal = window.useReveal();
      const isMobile = window.useIsMobile();
      return (
        <section ref={reveal} style={{
          padding: isMobile ? '56px 20px' : '120px 48px',
          maxWidth: 1280, margin: '0 auto',
        }}>
          <div className="reveal" style={{ textAlign: 'center', marginBottom: isMobile ? 32 : 56 }}>
            <div style={{ ...window.eyebrowStyle, color: LEADS_ACCENT }}>{t.testimonials.eyebrow}</div>
            <p style={{ fontSize: 16, color: 'var(--b-text-2)', margin: 0, maxWidth: 520, marginLeft: 'auto', marginRight: 'auto' }}>{t.testimonials.sub}</p>
          </div>
          <div style={{
            display: 'grid',
            gridTemplateColumns: isMobile ? '1fr' : 'repeat(3, 1fr)',
            gap: isMobile ? 16 : 24,
          }}>
            {t.testimonials.quotes.map((q, i) => (
              <figure key={i} className={`reveal reveal-d${i + 1}`} style={{
                background: 'var(--b-bg-elevated)', borderRadius: 32,
                padding: isMobile ? 28 : 36,
                boxShadow: 'var(--emboss-soft)',
                border: '1px solid var(--b-border)',
                margin: 0,
                display: 'flex', flexDirection: 'column', gap: 20,
              }}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{ flexShrink: 0, opacity: 0.6 }}>
                  <path d="M6 11c0-3 2-5 5-5v2c-2 0-3 1-3 3h3v5H6V11zm8 0c0-3 2-5 5-5v2c-2 0-3 1-3 3h3v5h-5V11z" fill={LEADS_ACCENT} />
                </svg>
                <blockquote style={{
                  margin: 0, fontSize: isMobile ? 16 : 17, lineHeight: 1.5,
                  color: 'var(--b-text)', letterSpacing: '-0.005em', flex: 1,
                }}>{q.q}</blockquote>
                <figcaption style={{ fontSize: 14, color: 'var(--b-text-2)', lineHeight: 1.5 }}>
                  <div style={{ fontWeight: 600, color: 'var(--b-text)' }}>{q.n}</div>
                  <div>{q.r} · {q.c}</div>
                </figcaption>
              </figure>
            ))}
          </div>
        </section>
      );
    }


    // ==========================================================================
    // LeadsFAQ — accordion
    // ==========================================================================

    function LeadsFAQ({ t }) {
      const reveal = window.useReveal();
      const isMobile = window.useIsMobile();
      const [open, setOpen] = React.useState(0);
      return (
        <section ref={reveal} style={{
          padding: isMobile ? '56px 20px' : '120px 48px',
          maxWidth: 960, margin: '0 auto',
        }}>
          <div className="reveal" style={{ marginBottom: isMobile ? 32 : 48 }}>
            <div style={{ ...window.eyebrowStyle, color: LEADS_ACCENT }}>{t.faq.eyebrow}</div>
            <h2 style={{
              fontSize: isMobile ? 36 : 52, fontWeight: 900, letterSpacing: '-0.035em',
              lineHeight: 1.02, margin: 0, color: 'var(--b-text)',
            }}>{t.faq.title}</h2>
          </div>
          <div className="reveal reveal-d1" style={{
            background: 'var(--b-bg-elevated)', borderRadius: 32,
            boxShadow: 'var(--emboss-soft)',
            border: '1px solid var(--b-border)',
            overflow: 'hidden',
          }}>
            {t.faq.items.map((item, i) => {
              const isOpen = open === i;
              return (
                <div key={i} style={{
                  borderTop: i === 0 ? 'none' : '1px solid var(--b-border)',
                }}>
                  <button
                    onClick={() => setOpen(isOpen ? -1 : i)}
                    style={{
                      width: '100%', textAlign: 'left', background: 'transparent',
                      border: 'none', cursor: 'pointer', fontFamily: 'inherit',
                      padding: isMobile ? '20px 24px' : '24px 32px',
                      display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 16,
                      fontSize: isMobile ? 16 : 17, fontWeight: 600, color: 'var(--b-text)',
                      letterSpacing: '-0.01em',
                    }}
                  >
                    <span>{item.q}</span>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{
                      flexShrink: 0,
                      transform: isOpen ? 'rotate(180deg)' : 'rotate(0)',
                      transition: 'transform 0.3s cubic-bezier(0.16,1,0.3,1)',
                    }}>
                      <path d="M3 5.5L7 9.5L11 5.5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" />
                    </svg>
                  </button>
                  <div style={{
                    maxHeight: isOpen ? 400 : 0,
                    overflow: 'hidden',
                    transition: 'max-height 0.35s cubic-bezier(0.16,1,0.3,1)',
                  }}>
                    <div style={{
                      padding: isMobile ? '0 24px 22px' : '0 32px 28px',
                      fontSize: 15, lineHeight: 1.6, color: 'var(--b-text-2)',
                      maxWidth: 720,
                    }}>{item.a}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </section>
      );
    }


    // ==========================================================================
    // LeadsEcosystem — cross-sell
    // ==========================================================================

    function LeadsEcosystem({ t }) {
      const reveal = window.useReveal();
      const isMobile = window.useIsMobile();
      return (
        <section ref={reveal} style={{
          padding: isMobile ? '56px 20px' : '120px 48px',
          maxWidth: 1200, margin: '0 auto',
        }}>
          <div className="reveal" style={{ textAlign: 'center', marginBottom: isMobile ? 32 : 48 }}>
            <div style={{ ...window.eyebrowStyle, color: LEADS_ACCENT }}>{t.ecosystem.eyebrow}</div>
            <h2 style={{
              fontSize: isMobile ? 32 : 44, fontWeight: 900, letterSpacing: '-0.035em',
              lineHeight: 1.05, margin: '0 0 12px', color: 'var(--b-text)',
            }}>{t.ecosystem.title}</h2>
            <p style={{ fontSize: 16, color: 'var(--b-text-2)', margin: 0, maxWidth: 520, marginLeft: 'auto', marginRight: 'auto' }}>{t.ecosystem.sub}</p>
          </div>
          <div style={{
            display: 'grid',
            gridTemplateColumns: isMobile ? '1fr' : 'repeat(3, 1fr)',
            gap: isMobile ? 16 : 20,
          }}>
            {t.ecosystem.items.map((it, i) => {
              const accent = window.ACCENTS[it.id].light;
              return (
                <a key={i} href={it.href} className={`reveal reveal-d${i + 1}`} style={{
                  background: 'var(--b-bg-elevated)', borderRadius: 28,
                  padding: isMobile ? 24 : 32,
                  boxShadow: 'var(--emboss-soft)',
                  border: `1px solid ${it.active ? accent + '55' : 'var(--b-border)'}`,
                  display: 'flex', flexDirection: 'column', gap: 14,
                  textDecoration: 'none',
                  transition: 'transform 0.2s ease',
                  position: 'relative',
                }}
                  onMouseEnter={(e) => { if (!it.active) e.currentTarget.style.transform = 'translateY(-3px)'; }}
                  onMouseLeave={(e) => { e.currentTarget.style.transform = 'translateY(0)'; }}
                >
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div style={{ width: 12, height: 12, borderRadius: 6, background: accent }} />
                    <div style={{ fontSize: 17, fontWeight: 700, color: 'var(--b-text)', letterSpacing: '-0.01em' }}>{it.name}</div>
                    {it.active && (
                      <span style={{
                        marginLeft: 'auto', fontSize: 11, fontWeight: 700,
                        color: accent, letterSpacing: '0.08em', textTransform: 'uppercase',
                      }}>Now</span>
                    )}
                  </div>
                  <div style={{ fontSize: 15, color: 'var(--b-text-2)', lineHeight: 1.5 }}>{it.tagline}</div>
                </a>
              );
            })}
          </div>
        </section>
      );
    }


    // ==========================================================================
    // App
    // ==========================================================================

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "lang": "en",
      "theme": "auto"
    }/*EDITMODE-END*/;

    function App() {
      const [lang, setLang] = React.useState(TWEAK_DEFAULTS.lang);
      const [theme, setTheme] = React.useState(TWEAK_DEFAULTS.theme);

      React.useEffect(() => {
        const mq = window.matchMedia('(prefers-color-scheme: dark)');
        const apply = () => {
          const effective = theme === 'auto' ? (mq.matches ? 'dark' : 'light') : theme;
          document.documentElement.setAttribute('data-theme', effective);
        };
        apply();
        if (theme === 'auto') {
          mq.addEventListener('change', apply);
          return () => mq.removeEventListener('change', apply);
        }
      }, [theme]);

      React.useEffect(() => {
        document.documentElement.setAttribute('lang', lang);
      }, [lang]);

      const effectiveTheme = window.useTheme();
      const shared = window.COPY[lang];
      const leads = LEADS_COPY[lang];
      const shotSrc = `assets/bricks-leads-${lang}-${effectiveTheme === 'dark' ? 'dark' : 'light'}.png`;

      window.useTweaks({ lang, setLang, theme, setTheme });

      return (
        <>
          <window.Header
            t={shared}
            lang={lang}
            currentProduct="leads"
            cta={{ label: lang === 'es' ? '\u00danete al beta' : 'Join the beta', href: '#join-beta' }}
          />
          <LeadsHero t={leads} lang={lang} theme={effectiveTheme} />
          <LeadsStats t={leads} />
          <LeadsPillars t={leads} />
          <LeadsFeatureSplit t={leads} lang={lang} theme={effectiveTheme} feature={leads.feature1} reverse={false} shotSrc={shotSrc} />
          <LeadsFeatureSplit t={leads} lang={lang} theme={effectiveTheme} feature={leads.feature2} reverse={true} shotSrc={shotSrc} />
          <LeadsTestimonials t={leads} />
          <window.DownloadCTA
            t={shared}
            variant="beta"
            betaCopy={leads.beta_cta}
            accent={LEADS_ACCENT}
          />
          <LeadsFAQ t={leads} />
          <LeadsEcosystem t={leads} />
          <window.Footer t={shared} lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>

</html>
